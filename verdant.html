<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verdant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// PIXEL SCALE
const TILE = 32;
const W = 800, H = 600;
canvas.width = W;
canvas.height = H;

// --- WORLD ---
const WORLD_W = 160 * TILE;
const WORLD_H = 120 * TILE;
const TOWN_X = 80 * TILE, TOWN_Y = 60 * TILE;

let discovered = new Set();
let player = { x: 20*TILE, y: 20*TILE, vx:0, vy:0, w:24, h:32, speed: 3.5, hp: 100, maxHp: 100 };
let camera = { x: 0, y: 0 };
let keys = {};
let mouse = { x:0, y:0, down:false };
let inventory = { wood:0, hide:0, bone:0, gold:0 };
let equipped = 'sword';
let trees = [];
let creatures = [];
let shopBuilt = false;
let shopPlatform = null;
let message = '';
let messageTimer = 0;
let showMap = false;

// Generate forest trees
for (let i = 0; i < 120; i++) {
    let x = Math.random() * WORLD_W;
    let y = Math.random() * WORLD_H;
    // Keep town area clear
    if (Math.abs(x - TOWN_X) < 400 && Math.abs(y - TOWN_Y) < 300) continue;
    trees.push({ x, y, size: 28 + Math.random() * 20, health: 3, regrowing: false });
}

// Generate creatures
for (let i = 0; i < 25; i++) {
    let x, y, ok;
    do {
        x = Math.random() * WORLD_W;
        y = Math.random() * WORLD_H;
        ok = Math.abs(x - TOWN_X) > 500 || Math.abs(y - TOWN_Y) > 500;
    } while (!ok);
    creatures.push({
        x, y, w: 28, h: 28,
        hp: 20, maxHp: 20,
        type: Math.random() < 0.6 ? 'deer' : 'wolf',
        state: 'idle',
        timer: Math.random() * 200,
        vx:0, vy:0,
        drops: Math.random() < 0.6 ? { type: 'hide', qty: 1 } : { type: 'bone', qty: 1 }
    });
}

// Dragon (one big boss)
let dragon = {
    x: TOWN_X + 800, y: TOWN_Y - 600,
    hp: 150, maxHp: 150,
    active: false,
    aggro: false,
    timer: 0,
    vx:0, vy:0,
    attackTimer: 0
};

function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function worldToScreen(wx, wy) {
    return { x: wx - camera.x + W/2, y: wy - camera.y + H/2 };
}

// --- TREE CHOPPING ---
function chopTree(tx, ty) {
    let closest = null, bestDist = Infinity;
    for (let t of trees) {
        let d = dist({x:tx,y:ty}, {x:t.x,y:t.y});
        if (d < 60 && d < bestDist) { bestDist = d; closest = t; }
    }
    if (!closest || closest.regrowing) return;
    closest.health--;
    if (closest.health <= 0) {
        inventory.wood += 4 + Math.floor(Math.random() * 3);
        closest.regrowing = true;
        setTimeout(() => {
            closest.health = 3;
            closest.regrowing = false;
        }, 30000);
        showMessage('+ Wood');
    }
}

// --- CREATURE HUNTING ---
function attackCreature(px, py, dir) {
    let ax = px + Math.cos(dir) * 40;
    let ay = py + Math.sin(dir) * 40;
    let range = 50;
    for (let c of creatures) {
        if (c.hp <= 0) continue;
        let d = dist({x:ax,y:ay}, {x:c.x,y:c.y});
        if (d < range) {
            c.hp -= 15 + Math.floor(Math.random() * 10);
            c.state = 'hit';
            c.vx = Math.cos(dir) * 6;
            c.vy = Math.sin(dir) * 6;
            if (c.hp <= 0) {
                let drop = c.drops;
                inventory[drop.type] = (inventory[drop.type] || 0) + drop.qty;
                inventory.bone = (inventory.bone || 0) + (c.type === 'wolf' ? 1 : 0);
                showMessage('+' + drop.qty + ' ' + drop.type);
                // Respawn after a while
                setTimeout(() => {
                    c.x = Math.random() * WORLD_W;
                    c.y = Math.random() * WORLD_H;
                    c.hp = c.maxHp;
                }, 15000);
            }
        }
    }
    // Dragon
    if (dragon.active && dist({x:ax,y:ay}, {x:dragon.x,y:dragon.y}) < 60) {
        dragon.hp -= 8 + Math.floor(Math.random() * 5);
        dragon.vx = Math.cos(dir) * 8;
        dragon.vy = Math.sin(dir) * 8;
        dragon.aggro = true;
        if (dragon.hp <= 0) {
            showMessage('Dragon slain! + Dragon Scale');
            inventory.hide = (inventory.hide || 0) + 5;
            dragon.active = false;
            setTimeout(() => {
                dragon.hp = dragon.maxHp;
                dragon.x = TOWN_X + 800 + (Math.random()-0.5)*400;
                dragon.y = TOWN_Y - 600 + (Math.random()-0.5)*400;
                dragon.active = true;
                dragon.aggro = false;
            }, 60000);
        }
    }
}

// --- SHOP PLATFORM ---
function buildShop() {
    if (shopBuilt) return;
    if (inventory.wood < 20) { showMessage('Need 20 wood'); return; }
    inventory.wood -= 20;
    shopBuilt = true;
    shopPlatform = { x: player.x, y: player.y };
    showMessage('Shop built!');
}

function showMessage(msg) {
    message = msg;
    messageTimer = 120;
}

// --- UPDATE ---
function update() {
    // Movement
    let mx = 0, my = 0;
    if (keys['w']||keys['ArrowUp']) my = -1;
    if (keys['s']||keys['ArrowDown']) my = 1;
    if (keys['a']||keys['ArrowLeft']) mx = -1;
    if (keys['d']||keys['ArrowRight']) mx = 1;
    if (mx && my) { mx *= 0.707; my *= 0.707; }
    player.vx += mx * player.speed * 0.3;
    player.vy += my * player.speed * 0.3;
    player.vx *= 0.8;
    player.vy *= 0.8;
    player.x += player.vx;
    player.y += player.vy;
    player.x = Math.max(16, Math.min(WORLD_W-16, player.x));
    player.y = Math.max(16, Math.min(WORLD_H-16, player.y));

    // Camera
    camera.x += (player.x - camera.x) * 0.1;
    camera.y += (player.y - camera.y) * 0.1;

    // Check discovered
    let cx = Math.floor(player.x / TILE);
    let cy = Math.floor(player.y / TILE);
    let cell = cx + ',' + cy;
    if (!discovered.has(cell)) {
        discovered.add(cell);
        if (discovered.size % 20 === 0) showMessage('New area discovered!');
    }

    // Town discovery
    let distToTown = dist(player, {x:TOWN_X, y:TOWN_Y});
    if (distToTown < 300) {
        discovered.add('town');
    }

    // Attack
    if (mouse.down && !showMap) {
        mouse.down = false;
        let dir = Math.atan2(mouse.y - H/2, mouse.x - W/2);
        if (equipped === 'sword') {
            attackCreature(player.x, player.y, dir);
        } else if (equipped === 'axe') {
            chopTree(player.x, player.y);
        }
    }

    // Build shop
    if (keys['b']) {
        keys['b'] = false;
        if (distToTown < 300) {
            buildShop();
        } else {
            showMessage('Find the town first!');
        }
    }

    // Map toggle
    if (keys['m']) {
        keys['m'] = false;
        showMap = !showMap;
    }

    // Equip swap
    if (keys['q']) {
        keys['q'] = false;
        equipped = equipped === 'sword' ? 'axe' : 'sword';
        showMessage('Equipped ' + equipped);
    }

    // Message timer
    if (messageTimer > 0) messageTimer--;

    // --- Creatures ---
    for (let c of creatures) {
        if (c.hp <= 0) continue;
        c.timer--;
        let d = dist(player, c);
        if (d < 200) {
            // Flee from player (deer) or approach (wolf)
            if (c.type === 'deer') {
                let away = Math.atan2(c.y - player.y, c.x - player.x);
                c.vx += Math.cos(away) * 0.3;
                c.vy += Math.sin(away) * 0.3;
            } else {
                let toward = Math.atan2(player.y - c.y, player.x - c.x);
                c.vx += Math.cos(toward) * 0.2;
                c.vy += Math.sin(toward) * 0.2;
                if (d < 30 && c.timer <= 0) {
                    player.hp -= 5;
                    c.timer = 60;
                    showMessage('-5 HP!');
                }
            }
        } else if (c.timer <= 0) {
            c.state = 'wander';
            c.vx += (Math.random()-0.5) * 0.5;
            c.vy += (Math.random()-0.5) * 0.5;
            c.timer = 60 + Math.random() * 120;
        }
        c.vx *= 0.9;
        c.vy *= 0.9;
        c.x += c.vx;
        c.y += c.vy;
        c.x = Math.max(16, Math.min(WORLD_W-16, c.x));
        c.y = Math.max(16, Math.min(WORLD_H-16, c.y));
        if (c.state === 'hit' && Math.abs(c.vx) < 0.3 && Math.abs(c.vy) < 0.3) c.state = 'idle';
    }

    // --- Dragon ---
    if (dragon.active) {
        let dd = dist(player, dragon);
        if (dd < 500) dragon.aggro = true;
        if (dragon.aggro) {
            let da = Math.atan2(player.y - dragon.y, player.x - dragon.x);
            dragon.vx += Math.cos(da) * 0.15;
            dragon.vy += Math.sin(da) * 0.15;
            if (dd < 60 && dragon.timer <= 0) {
                player.hp -= 15;
                dragon.timer = 80;
                showMessage('Dragon claw! -15 HP!');
            }
        } else {
            dragon.vx += (Math.random()-0.5) * 0.2;
            dragon.vy += (Math.random()-0.5) * 0.2;
        }
        dragon.vx *= 0.97;
        dragon.vy *= 0.97;
        dragon.x += dragon.vx;
        dragon.y += dragon.vy;
        if (dragon.timer > 0) dragon.timer--;
    } else {
        if (dist(player, {x:TOWN_X+800, y:TOWN_Y-600}) < 600 ||
            (Math.random() < 0.001 && player.x > WORLD_W/2)) {
            dragon.active = true;
        }
    }

    // Death
    if (player.hp <= 0) {
        player.hp = player.maxHp;
        player.x = 20*TILE;
        player.y = 20*TILE;
        showMessage('You died! Respawned at start');
        // Respawn dragon if killed
        if (dragon.hp <= 0) {
            dragon.hp = dragon.maxHp;
            dragon.active = true;
        }
    }
}

// --- DRAW ---
function draw() {
    // Sky / background
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Ground
    let startCX = Math.floor((camera.x - W/2) / TILE) - 1;
    let startCY = Math.floor((camera.y - H/2) / TILE) - 1;
    let endCX = Math.ceil((camera.x + W/2) / TILE) + 1;
    let endCY = Math.ceil((camera.y + H/2) / TILE) + 1;
    for (let cy = startCY; cy <= endCY; cy++) {
        for (let cx = startCX; cx <= endCX; cx++) {
            let wx = cx * TILE, wy = cy * TILE;
            let s = worldToScreen(wx, wy);
            // Forest ground - varies
            let shade = ((cx * 7 + cy * 13) % 5) * 5;
            ctx.fillStyle = `rgb(${30+shade}, ${80+shade}, ${30+shade})`;
            ctx.fillRect(s.x, s.y, TILE+1, TILE+1);
        }
    }

    // World border
    let tl = worldToScreen(0, 0);
    let br = worldToScreen(WORLD_W, WORLD_H);
    ctx.strokeStyle = '#4a3a2a';
    ctx.lineWidth = 4;
    ctx.strokeRect(tl.x, tl.y, br.x - tl.x, br.y - tl.y);

    // Trees
    for (let t of trees) {
        if (t.regrowing) continue;
        let s = worldToScreen(t.x, t.y);
        if (s.x < -50 || s.x > W+50 || s.y < -50 || s.y > H+50) continue;
        // Trunk
        ctx.fillStyle = '#4a3728';
        ctx.fillRect(s.x - 4, s.y - 4, 8, 12);
        // Foliage
        let r = t.size / 2;
        ctx.fillStyle = t.health === 3 ? '#2d5a27' : t.health === 2 ? '#3a6b30' : '#4a7a38';
        ctx.beginPath();
        ctx.arc(s.x, s.y - r/2, r, 0, Math.PI * 2);
        ctx.fill();
        // Darker inner
        ctx.fillStyle = t.health === 3 ? '#1e3d1a' : '#2a4f22';
        ctx.beginPath();
        ctx.arc(s.x, s.y - r/3, r * 0.6, 0, Math.PI * 2);
        ctx.fill();
    }

    // Creatures
    for (let c of creatures) {
        if (c.hp <= 0) continue;
        let s = worldToScreen(c.x, c.y);
        if (s.x < -30 || s.x > W+30 || s.y < -30 || s.y > H+30) continue;
        if (c.type === 'deer') {
            ctx.fillStyle = '#8B6914';
            ctx.fillRect(s.x - 10, s.y - 8, 20, 16); // body
            ctx.fillStyle = '#6B4F12';
            ctx.fillRect(s.x - 4, s.y - 16, 8, 10); // head
            // Legs
            ctx.fillStyle = '#5a3e0e';
            ctx.fillRect(s.x - 8, s.y + 8, 4, 10);
            ctx.fillRect(s.x + 4, s.y + 8, 4, 10);
        } else {
            ctx.fillStyle = '#555';
            ctx.fillRect(s.x - 10, s.y - 8, 20, 16); // body
            ctx.fillStyle = '#444';
            ctx.fillRect(s.x - 4, s.y - 16, 8, 10); // head
            ctx.fillStyle = '#666';
            ctx.fillRect(s.x - 8, s.y + 8, 4, 10);
            ctx.fillRect(s.x + 4, s.y + 8, 4, 10);
            // Eyes
            ctx.fillStyle = '#ff4';
            ctx.fillRect(s.x - 3, s.y - 14, 3, 3);
            ctx.fillRect(s.x + 2, s.y - 14, 3, 3);
        }
    }

    // Dragon
    if (dragon.active && dragon.hp > 0) {
        let s = worldToScreen(dragon.x, dragon.y);
        if (s.x > -100 && s.x < W+100 && s.y > -100 && s.y < H+100) {
            // Body
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(s.x - 20, s.y - 12, 40, 24);
            // Neck + head
            ctx.fillStyle = '#a00000';
            ctx.fillRect(s.x - 4, s.y - 28, 8, 18);
            ctx.fillRect(s.x - 8, s.y - 28, 16, 10);
            // Wings
            ctx.fillStyle = '#600';
            ctx.beginPath();
            ctx.moveTo(s.x - 20, s.y - 8);
            ctx.lineTo(s.x - 40, s.y - 30);
            ctx.lineTo(s.x - 18, s.y - 5);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(s.x + 20, s.y - 8);
            ctx.lineTo(s.x + 40, s.y - 30);
            ctx.lineTo(s.x + 18, s.y - 5);
            ctx.fill();
            // Eyes
            ctx.fillStyle = '#ff0';
            ctx.fillRect(s.x - 6, s.y - 26, 4, 4);
            ctx.fillRect(s.x + 2, s.y - 26, 4, 4);
            // HP bar
            ctx.fillStyle = '#333';
            ctx.fillRect(s.x - 30, s.y - 40, 60, 6);
            ctx.fillStyle = '#f00';
            ctx.fillRect(s.x - 30, s.y - 40, 60 * (dragon.hp/dragon.maxHp), 6);
        }
    }

    // Town
    {
        let s = worldToScreen(TOWN_X, TOWN_Y);
        if (s.x > -200 && s.x < W+200 && s.y > -200 && s.y < H+200) {
            // Town ground
            ctx.fillStyle = '#5a4a3a';
            ctx.fillRect(s.x - 150, s.y - 100, 300, 200);
            // Buildings
            ctx.fillStyle = '#7a5a3a';
            ctx.fillRect(s.x - 60, s.y - 80, 50, 60);
            ctx.fillStyle = '#8a6a4a';
            ctx.fillRect(s.x + 30, s.y - 60, 60, 40);
            // Roofs
            ctx.fillStyle = '#6a3a1a';
            ctx.beginPath();
            ctx.moveTo(s.x - 70, s.y - 80);
            ctx.lineTo(s.x - 35, s.y - 100);
            ctx.lineTo(s.x, s.y - 80);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(s.x + 20, s.y - 60);
            ctx.lineTo(s.x + 60, s.y - 80);
            ctx.lineTo(s.x + 100, s.y - 60);
            ctx.fill();
            // Signpost
            ctx.fillStyle = '#5a3a1a';
            ctx.fillRect(s.x + 70, s.y - 20, 4, 40);
            ctx.fillStyle = '#3a2a1a';
            ctx.font = '10px sans-serif';
            ctx.fillText('T O W N', s.x + 55, s.y - 25);
            // Label when discovered
            if (discovered.has('town')) {
                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('✦ Verdant Town', s.x, s.y - 110);
                ctx.textAlign = 'left';
            }
        }
    }

    // Shop platform
    if (shopPlatform) {
        let s = worldToScreen(shopPlatform.x, shopPlatform.y);
        if (s.x > -50 && s.x < W+50 && s.y > -50 && s.y < H+50) {
            ctx.fillStyle = '#6B4226';
            ctx.fillRect(s.x - 25, s.y - 10, 50, 20);
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(s.x - 22, s.y - 12, 44, 8);
            ctx.fillStyle = '#ffd700';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('✦ Shop', s.x, s.y - 18);
            ctx.textAlign = 'left';
        }
    }

    // Player
    {
        let s = worldToScreen(player.x, player.y);
        // Body
        ctx.fillStyle = '#2a6ab0';
        ctx.fillRect(s.x - 12, s.y - 12, 24, 24);
        // Head
        ctx.fillStyle = '#e8c090';
        ctx.fillRect(s.x - 8, s.y - 20, 16, 10);
        // Eyes
        ctx.fillStyle = '#222';
        ctx.fillRect(s.x - 5, s.y - 18, 3, 3);
        ctx.fillRect(s.x + 2, s.y - 18, 3, 3);
        // Equipment indicator
        ctx.fillStyle = '#ccc';
        ctx.font = '10px sans-serif';
        ctx.fillText('[' + equipped + ']', s.x - 20, s.y - 28);
    }

    // HUD
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(4, 4, 200, 90);

    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.fillText('HP: ' + player.hp + '/' + player.maxHp, 10, 20);
    ctx.fillText('Wood: ' + inventory.wood, 10, 36);
    ctx.fillText('Hide: ' + (inventory.hide||0), 10, 52);
    ctx.fillText('Bone: ' + (inventory.bone||0), 10, 68);
    ctx.fillText('Gold: ' + (inventory.gold||0), 10, 84);

    // Controls hint
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W - 210, 4, 206, 80);
    ctx.fillStyle = '#aaa';
    ctx.font = '11px sans-serif';
    ctx.fillText('WASD - Move', W - 204, 20);
    ctx.fillText('Click - Attack/Chop', W - 204, 36);
    ctx.fillText('Q - Swap weapon', W - 204, 52);
    ctx.fillText('M - Map', W - 204, 68);
    ctx.fillText('B - Build shop (in town)', W - 204, 84);

    // Message
    if (messageTimer > 0) {
        ctx.fillStyle = `rgba(255,255,255,${Math.min(1, messageTimer/30)})`;
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(message, W/2, 50);
        ctx.textAlign = 'left';
    }

    // Map overlay
    if (showMap) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, W, H);
        let mapScale = Math.min(W/2 / WORLD_W, H/2 / WORLD_H) * 1.5;
        let mapW = WORLD_W * mapScale;
        let mapH = WORLD_H * mapScale;
        let mapX = (W - mapW) / 2;
        let mapY = 60;

        // Border
        ctx.strokeStyle = '#4a6a3a';
        ctx.lineWidth = 2;
        ctx.strokeRect(mapX, mapY, mapW, mapH);

        // Forest shading
        ctx.fillStyle = 'rgba(20,60,20,0.3)';
        ctx.fillRect(mapX, mapY, mapW, mapH);

        // Town marker
        let twx = mapX + TOWN_X * mapScale;
        let twy = mapY + TOWN_Y * mapScale;
        if (discovered.has('town')) {
            ctx.fillStyle = '#ffd700';
            ctx.font = '20px sans-serif';
            ctx.fillText('✦', twx - 8, twy + 6);
            ctx.fillStyle = '#ffd700';
            ctx.font = '10px sans-serif';
            ctx.fillText('Town', twx + 12, twy + 5);
        } else {
            ctx.fillStyle = '#666';
            ctx.fillRect(twx - 4, twy - 4, 8, 8);
        }

        // Player marker
        let px = mapX + player.x * mapScale;
        let py = mapY + player.y * mapScale;
        ctx.fillStyle = '#4af';
        ctx.beginPath();
        ctx.arc(px, py, 5, 0, Math.PI * 2);
        ctx.fill();

        // Dragon marker (if alive)
        if (dragon.active && dragon.hp > 0) {
            let dx = mapX + dragon.x * mapScale;
            let dy = mapY + dragon.y * mapScale;
            ctx.fillStyle = '#f44';
            ctx.font = '14px sans-serif';
            ctx.fillText('🐉', dx - 7, dy + 5);
        }

        // Discovered cells
        ctx.fillStyle = 'rgba(100,200,100,0.15)';
        for (let cell of discovered) {
            if (cell === 'town') continue;
            let [cx, cy] = cell.split(',').map(Number);
            let dx = mapX + (cx * TILE) * mapScale;
            let dy = mapY + (cy * TILE) * mapScale;
            ctx.fillRect(dx, dy, TILE * mapScale + 1, TILE * mapScale + 1);
        }

        // Teleport: Click on discovered locations
        ctx.fillStyle = '#aaa';
        ctx.font = '12px sans-serif';
        ctx.fillText('Click discovered area to teleport', W/2 - 90, H - 30);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText('✦ MAP ✦', W/2 - 20, 40);

        // Store map click info
        window._mapData = { mapX, mapY, mapScale };
    }

    // Map teleport click handler
    canvas.onclick = function(e) {
        if (!showMap) {
            mouse.down = true;
            return;
        }
        let rect = canvas.getBoundingClientRect();
        let cx = (e.clientX - rect.left) * (canvas.width / rect.width);
        let cy = (e.clientY - rect.top) * (canvas.height / rect.height);
        let md = window._mapData;
        if (!md) return;
        // Check if clicking a discovered cell
        let closest = null, bestDist = Infinity;
        for (let cell of discovered) {
            if (cell === 'town') {
                let dx = md.mapX + TOWN_X * md.mapScale;
                let dy = md.mapY + TOWN_Y * md.mapScale;
                let d = Math.hypot(cx - dx, cy - dy);
                if (d < 20 && d < bestDist) { bestDist = d; closest = 'town'; }
                continue;
            }
            let [cx2, cy2] = cell.split(',').map(Number);
            let dx = md.mapX + (cx2 * TILE) * md.mapScale;
            let dy = md.mapY + (cy2 * TILE) * md.mapScale;
            let d = Math.hypot(cx - dx, cy - dy);
            if (d < 20 && d < bestDist) { bestDist = d; closest = cell; }
        }
        if (closest === 'town') {
            player.x = TOWN_X;
            player.y = TOWN_Y;
            showMap = false;
            showMessage('Teleported to Town');
        } else if (closest) {
            let [cx2, cy2] = closest.split(',').map(Number);
            player.x = cx2 * TILE;
            player.y = cy2 * TILE;
            showMap = false;
            showMessage('Teleported!');
        }
    };
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Input
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === 'm' || e.key === 'b' || e.key === 'q') e.preventDefault();
});
window.addEventListener('keyup', e => {
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('mousemove', e => {
    let rect = canvas.getBoundingClientRect();
    mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
    mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
});

loop();
</script>
</body>
</html>
