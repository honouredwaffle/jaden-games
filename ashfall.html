<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ashfall</title>
<style>
*{margin:0;padding:0}
body{overflow:hidden;background:#000;font-family:monospace}
canvas{display:block}
#hud{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#ddd;font-size:13px;text-align:center;pointer-events:none;user-select:none;text-shadow:0 0 6px #000;background:rgba(0,0,0,0.5);padding:8px 16px;border-radius:8px;line-height:1.6;border:1px solid rgba(255,255,255,0.08)}
#hud kbd{display:inline-block;background:rgba(255,255,255,0.12);padding:2px 7px;border-radius:3px;font-size:11px;border:1px solid rgba(255,255,255,0.15);color:#fff}
#health-bar{position:fixed;top:20px;left:20px;width:200px;height:14px;background:rgba(0,0,0,0.5);border-radius:7px;border:1px solid rgba(255,255,255,0.1);overflow:hidden}
#health-fill{width:100%;height:100%;background:linear-gradient(90deg,#e74c3c,#e67e22);border-radius:7px;transition:width 0.2s}
#health-label{position:fixed;top:22px;left:230px;color:rgba(255,255,255,0.4);font-size:11px}
#sheath-status{position:fixed;top:20px;right:20px;font-size:13px;text-align:right;line-height:1.5;text-shadow:0 0 6px #000}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.3);pointer-events:none}
#click-prompt{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.4);font-size:18px;pointer-events:none;text-shadow:0 0 12px #000;transition:opacity 0.5s}
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="health-bar"><div id="health-fill"></div></div>
<div id="health-label">Vitality</div>
<div id="sheath-status"><span style="color:#888">🗡️ Sheathed</span></div>
<div id="click-prompt">Click to play</div>
<div id="hud"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;|&nbsp; <kbd>Shift</kbd> Sprint &nbsp;|&nbsp; <kbd>Space</kbd> Jump &nbsp;|&nbsp; <kbd>LMB</kbd> Swing &nbsp;|&nbsp; <kbd>R</kbd> Draw/Sheathe</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// === SETUP ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const fogColor = new THREE.Color(0xb0c4de);
scene.fog = new THREE.Fog(fogColor, 60, 120);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.prepend(renderer.domElement);

camera.position.set(5, 3, 7);
camera.lookAt(0, 0.8, 0);

// === LIGHTING ===
const ambient = new THREE.AmbientLight(0xaaccff, 0.7);
scene.add(ambient);

const hemi = new THREE.HemisphereLight(0x87ceeb, 0x8b6f4e, 0.5);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffdd99, 2.0);
sun.position.set(30, 40, -20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -30;
sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30;
sun.shadow.camera.bottom = -30;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x88bbff, 0.4);
fill.position.set(-20, 10, 20);
scene.add(fill);

// === TERRAIN ===
const size = 80;
const seg = 80;
const tg = new THREE.PlaneGeometry(size, size, seg, seg);
tg.rotateX(-Math.PI/2);
const tp = tg.attributes.position;
for (let i = 0; i < tp.count; i++) {
  const x = tp.getX(i), z = tp.getZ(i);
  let h = 0;
  h += Math.sin(x*0.08)*Math.cos(z*0.06)*1.2;
  h += Math.sin(x*0.15+z*0.12)*0.8;
  h += Math.cos(x*0.25)*Math.sin(z*0.22)*0.4;
  tp.setY(i, h);
}
tg.computeVertexNormals();
const ground = new THREE.Mesh(tg, new THREE.MeshStandardMaterial({
  color: 0xc4a882, roughness: 0.9, metalness: 0
}));
ground.receiveShadow = true;
scene.add(ground);

// Sandy patches
const sandPatch = new THREE.Mesh(tg.clone(), new THREE.MeshStandardMaterial({
  color: 0xd4b88a, roughness: 0.95, metalness: 0, transparent: true, opacity: 0.15
}));
sandPatch.position.y = 0.03;
scene.add(sandPatch);

// Grass tufts & rocks scatter
const scatter = new THREE.Group();
for (let i = 0; i < 150; i++) {
  const x = (Math.random()-0.5)*70, z = (Math.random()-0.5)*70;
  if (Math.abs(x)<4 && Math.abs(z)<4) continue;
  let h = 0;
  h += Math.sin(x*0.08)*Math.cos(z*0.06)*1.2;
  h += Math.sin(x*0.15+z*0.12)*0.8;
  h += Math.cos(x*0.25)*Math.sin(z*0.22)*0.4;
  if (Math.random()<0.5) {
    const r = new THREE.Mesh(new THREE.DodecahedronGeometry(0.15+Math.random()*0.4),
      new THREE.MeshStandardMaterial({color:0x8a7a6a,roughness:0.9}));
    r.position.set(x, h, z);
    r.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
    r.scale.y = 0.4+Math.random()*0.5;
    r.castShadow = r.receiveShadow = true;
    scatter.add(r);
  } else {
    const s = new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.05,0.2+Math.random()*0.3,4),
      new THREE.MeshStandardMaterial({color:0x7a8a5a,roughness:0.8}));
    s.position.set(x, h+0.1, z);
    scatter.add(s);
  }
}
scene.add(scatter);

// === PLAYER (CYBERNETIC WOLF WARRIOR) ===
const player = new THREE.Group();

// Materials
const armB = new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:0.4,metalness:0.5});
const armG = new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.3,metalness:0.6});
const redM = new THREE.MeshStandardMaterial({color:0xdd2222,roughness:0.5,metalness:0.3,emissive:0x881111,emissiveIntensity:0.4});
const skin = new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.6});
const hair = new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.5});
const capeM = new THREE.MeshStandardMaterial({color:0x444444,roughness:0.8,side:THREE.DoubleSide});
const scarfM = new THREE.MeshStandardMaterial({color:0xcc2222,roughness:0.7,side:THREE.DoubleSide});
const glowM = new THREE.MeshStandardMaterial({color:0xff3333,emissive:0xff2222,emissiveIntensity:1});

// Torso
const tor = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.32,0.5,10), armB);
tor.position.y = 0.7;
tor.castShadow = true;
player.add(tor);

// Chest core
const core = new THREE.Mesh(new THREE.CircleGeometry(0.07,8), redM);
core.position.set(0,0.75,-0.31);
player.add(core);

// Shoulders
[-1,1].forEach(s=>{
  const pa = new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6), armB);
  pa.position.set(s*0.33,0.92,0);
  pa.scale.set(1,0.5,0.7);
  pa.castShadow = true;
  player.add(pa);
  // red ring
  const rn = new THREE.Mesh(new THREE.TorusGeometry(0.11,0.008,4,8), redM);
  rn.position.set(s*0.33,0.86,0);
  rn.rotation.x = Math.PI/2;
  player.add(rn);
});

// Hips
const hip = new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.3,0.15,8), armG);
hip.position.y = 0.45;
player.add(hip);
const belt = new THREE.Mesh(new THREE.TorusGeometry(0.27,0.012,4,10), redM);
belt.position.set(0,0.49,0);
belt.rotation.x = Math.PI/2;
player.add(belt);

// Legs (digitigrade)
function makeLeg(side) {
  const g = new THREE.Group();
  const th = new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.08,0.25,6), armB);
  th.position.y = 0.125;
  th.castShadow = true;
  g.add(th);
  const sh = new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.05,0.2,6), armG);
  sh.position.set(0.02,-0.08,0.04);
  sh.rotation.x = 0.2;
  sh.castShadow = true;
  g.add(sh);
  // red line
  const rp = [new THREE.Vector3(0.08,0.05,0),new THREE.Vector3(0.07,-0.05,0.02),new THREE.Vector3(0.06,-0.15,0.04)];
  g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(rp),new THREE.LineBasicMaterial({color:0xff3333})));
  // foot
  const ft = new THREE.Mesh(new THREE.SphereGeometry(0.05,5,5), new THREE.MeshStandardMaterial({color:0x222222,metalness:0.8,roughness:0.2}));
  ft.position.set(0.03,-0.19,0.07);
  g.add(ft);
  // toes
  for(let t=-1;t<=1;t++){
    const cl = new THREE.Mesh(new THREE.ConeGeometry(0.012,0.07,4), new THREE.MeshStandardMaterial({color:0x111111,metalness:0.9,roughness:0.1}));
    cl.position.set(0.02+t*0.02,-0.24,0.06+t*0.02);
    cl.rotation.x = 0.4;
    g.add(cl);
  }
  g.position.set(side*0.1,0.2,0);
  return g;
}
player.add(makeLeg(-1));
player.add(makeLeg(1));

// Arms
function makeArm(side) {
  const g = new THREE.Group();
  const ua = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.055,0.2,6), armB);
  ua.position.y = 0.1;
  ua.castShadow = true;
  g.add(ua);
  const fa = new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.04,0.18,6), armG);
  fa.position.set(0,-0.1,0);
  fa.castShadow = true;
  g.add(fa);
  const ga = new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.06,6), new THREE.MeshStandardMaterial({color:0x333333,metalness:0.7,roughness:0.3}));
  ga.position.set(0,-0.2,0);
  g.add(ga);
  // claws
  for(let t=-1;t<=1;t++){
    const cl = new THREE.Mesh(new THREE.ConeGeometry(0.007,0.05,4), new THREE.MeshStandardMaterial({color:0x111111,metalness:0.9,roughness:0.1}));
    cl.position.set(t*0.022,-0.24,0.01);
    cl.rotation.x = 0.5;
    g.add(cl);
  }
  // red ring
  const rr = new THREE.Mesh(new THREE.TorusGeometry(0.045,0.006,4,8), redM);
  rr.position.set(0,-0.05,0);
  rr.rotation.x = Math.PI/2;
  g.add(rr);
  g.position.set(side*0.32,0.63,0);
  return g;
}
player.add(makeArm(-1));
player.add(makeArm(1));

// Head
const hG = new THREE.Group();

const headBase = new THREE.Mesh(new THREE.SphereGeometry(0.17,8,8), new THREE.MeshStandardMaterial({color:0xddaa88,roughness:0.5}));
headBase.scale.set(1,0.9,0.85);
headBase.castShadow = true;
hG.add(headBase);

// Wolf mask
const mask = new THREE.Mesh(new THREE.SphereGeometry(0.175,8,8), armB);
mask.scale.set(1,0.8,0.9);
mask.position.z = -0.02;
hG.add(mask);

// Snout
const snout = new THREE.Mesh(new THREE.ConeGeometry(0.04,0.07,5), armB);
snout.position.set(0,-0.02,-0.18);
snout.rotation.x = 0.3;
hG.add(snout);

// Nose
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.015,6,6), new THREE.MeshStandardMaterial({color:0x111111}));
nose.position.set(0,-0.01,-0.21);
hG.add(nose);

// Ears
[-1,1].forEach(s=>{
  const e = new THREE.Mesh(new THREE.ConeGeometry(0.025,0.07,4), armB);
  e.position.set(s*0.08,0.16,0);
  e.rotation.set(-0.2,0,s*0.3);
  e.castShadow = true;
  hG.add(e);
  const ei = new THREE.Mesh(new THREE.ConeGeometry(0.012,0.04,4), redM);
  ei.position.set(s*0.08,0.15,0.005);
  ei.rotation.set(-0.2,0,s*0.3);
  hG.add(ei);
});

// Red markings
[-1,1].forEach(s=>{
  const m1 = new THREE.Mesh(new THREE.BoxGeometry(0.015,0.003,0.025), redM);
  m1.position.set(s*0.065,-0.01,-0.16);
  m1.rotation.z = s*0.4;
  hG.add(m1);
  const m2 = new THREE.Mesh(new THREE.BoxGeometry(0.008,0.003,0.02), redM);
  m2.position.set(s*0.045,-0.03,-0.17);
  m2.rotation.z = s*0.3;
  hG.add(m2);
});

// Eyes
[-1,1].forEach(s=>{
  const e = new THREE.Mesh(new THREE.SphereGeometry(0.015,6,6), glowM);
  e.position.set(s*0.055,0.03,-0.17);
  hG.add(e);
});

// Hair spikes
for(let i=0;i<8;i++){
  const sp = new THREE.Mesh(new THREE.ConeGeometry(0.012+Math.random()*0.01,0.05+Math.random()*0.06,4), hair);
  const a = i/8*Math.PI*2, r = 0.06+Math.random()*0.04;
  sp.position.set(Math.cos(a)*r,0.14+Math.random()*0.04,Math.sin(a)*r);
  sp.rotation.set((Math.random()-0.5)*0.5,(Math.random()-0.5)*0.5,(Math.random()-0.5)*0.5);
  hG.add(sp);
}
// top spike
const ts = new THREE.Mesh(new THREE.ConeGeometry(0.02,0.09,4), hair);
ts.position.set(0,0.19,0.02);
ts.castShadow = true;
hG.add(ts);

hG.position.y = 1.22;
player.add(hG);

// Cape
const cG = new THREE.Group();
for(let i=0;i<5;i++){
  const h = 0.3+i*0.1;
  const p = new THREE.Mesh(new THREE.PlaneGeometry(0.25-i*0.02,h), capeM);
  p.position.set((i-2)*0.035,0.6-h/2-0.05,-0.27);
  p.rotation.set(0.15+i*0.05,(i-2)*0.08,0);
  cG.add(p);
}
// Red scarf
const sf = new THREE.Mesh(new THREE.PlaneGeometry(0.32,0.04), scarfM);
sf.position.set(0,0.92,0);
cG.add(sf);
// Scarf flowing side
for(let i=0;i<3;i++){
  const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.005,0.12,3), scarfM);
  seg.position.set(0.04+i*0.08,0.86-i*0.04,0.04+i*0.04);
  seg.rotation.z = -0.2-i*0.1;
  seg.rotation.x = 0.1+i*0.05;
  cG.add(seg);
}
player.add(cG);

// Ground ring under player (so you can always find them)
const ringM = new THREE.Mesh(new THREE.RingGeometry(0.35,0.45,16),
  new THREE.MeshBasicMaterial({color:0xff6644,transparent:true,opacity:0.3,side:THREE.DoubleSide}));
ringM.rotation.x = -Math.PI/2;
ringM.position.y = 0.03;
player.add(ringM);

// === SWORD ===
const swordGroup = new THREE.Group();
const bladeMatSword = new THREE.MeshStandardMaterial({color:0xcccccc,metalness:0.9,roughness:0.12,side:THREE.DoubleSide});
const goldMat = new THREE.MeshStandardMaterial({color:0xccaa44,metalness:0.8,roughness:0.3});

// Blade
const bShape = new THREE.Shape();
bShape.moveTo(-0.015,0);
bShape.quadraticCurveTo(-0.02,0.15,-0.005,0.65);
bShape.quadraticCurveTo(0,0.7,0.005,0.65);
bShape.quadraticCurveTo(0.02,0.15,0.015,0);
const bExtrude = {depth:0.005,bevelEnabled:true,bevelThickness:0.005,bevelSize:0.002,bevelSegments:3};
const bGeo = new THREE.ExtrudeGeometry(bShape,bExtrude);
const bladeMesh = new THREE.Mesh(bGeo,bladeMatSword);
bladeMesh.position.set(-0.3,0.4,0);
bladeMesh.rotation.z = -0.15;
bladeMesh.castShadow = true;
swordGroup.add(bladeMesh);

// Edge glow
const ePts = [];
for(let t=0;t<=1;t+=0.05)ePts.push(new THREE.Vector3(-0.305,0.4+t*0.65,0));
const eG = new THREE.BufferGeometry().setFromPoints(ePts);
swordGroup.add(new THREE.Line(eG,new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.4})));

// Tsuba
const tsuba = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.07,0.02,12),goldMat);
tsuba.position.set(-0.3,0.38,0);
tsuba.rotation.x = Math.PI/2;
tsuba.castShadow = true;
swordGroup.add(tsuba);

// Handle
const hGeo = new THREE.CylinderGeometry(0.028,0.03,0.35,8);
const hMat = new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9});
const handle = new THREE.Mesh(hGeo,hMat);
handle.position.set(-0.3,0.2,0);
handle.castShadow = true;
swordGroup.add(handle);
// Wrap rings
for(let i=0;i<6;i++){
  const r = new THREE.Mesh(new THREE.TorusGeometry(0.03,0.006,4,8),new THREE.MeshStandardMaterial({color:0x222222,roughness:0.8}));
  r.position.set(-0.3,0.12+i*0.045,0);
  r.rotation.x = Math.PI/2;
  swordGroup.add(r);
}

// Pommel
const pom = new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),goldMat);
pom.position.set(-0.3,0.02,0);
swordGroup.add(pom);

// Scabbard (saya)
const sayG = new THREE.Group();
const sShape = new THREE.Shape();
sShape.moveTo(-0.025,0);
sShape.quadraticCurveTo(-0.03,0.2,-0.02,0.6);
sShape.quadraticCurveTo(-0.015,0.65,0);
sShape.quadraticCurveTo(0.015,0.65,0.02,0.6);
sShape.quadraticCurveTo(0.03,0.2,0.025,0);
const sExtrude = {depth:0.03,bevelEnabled:true,bevelThickness:0.005,bevelSize:0.003,bevelSegments:3};
const sayM = new THREE.Mesh(new THREE.ExtrudeGeometry(sShape,sExtrude),
  new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:0.8,metalness:0.2,side:THREE.DoubleSide}));
sayM.position.set(0.25,0.1,0);
sayM.rotation.z = 0.1;
sayM.castShadow = true;
sayG.add(sayM);

// Dragon pattern on scabbard
for(let i=0;i<3;i++){
  const pts = [];
  for(let t=0;t<=1;t+=0.05){
    const a = t*Math.PI*4, y = 0.15+t*0.35, x = 0.25+Math.sin(a)*0.008*(0.3+i*0.15);
    pts.push(new THREE.Vector3(x,0.1+y,0.016));
  }
  sayG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:0x886644,transparent:true,opacity:0.4})));
}
// Saya cord
const cPts = [];
for(let t=0;t<=1;t+=0.1){
  cPts.push(new THREE.Vector3(0.28,0.1+0.15+t*0.35,Math.sin(t*Math.PI*6)*0.01));
}
sayG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(cPts),
  new THREE.LineBasicMaterial({color:0x664422})));

sayG.position.set(-0.15,0.4,0.12);
sayG.rotation.set(0.2,0,-0.3);
player.add(sayG);

// Add sword to right hand
swordGroup.position.set(0.35,0.55,0);
swordGroup.rotation.set(-0.5,0,0.3);
player.add(swordGroup);

// === PHYSICS ===
const vel = new THREE.Vector3();
const grav = -16;
const jumpSpd = 6.5;
let onGround = true;
let health = 100;
let drawn = false;
let swinging = false;
let swingT = 0;
const swingDur = 0.3;
const sheathPos = new THREE.Vector3(0.35,0.55,0);
const sheathRot = new THREE.Euler(-0.5,0,0.3);
const drawPos = new THREE.Vector3(0.45,0.5,0.15);
const drawRot = new THREE.Euler(-0.2,0.2,-0.3);

// === CAMERA ===
let th = 0, ph = 0.5;
const camDist = 5.5;
const camSm = 0.1;
let tgtTh = 0, tgtPh = 0.5;

// === INPUT ===
const k = {};
let locked = false;

onkeydown = e => {
  k[e.key.toLowerCase()] = true;
  if(e.key==='r'||e.key==='R') {
    if(drawn && swinging) return;
    drawn = !drawn;
    if(drawn) { swinging = true; swingT = 0; }
  }
};
onkeyup = e => { k[e.key.toLowerCase()] = false; };

renderer.domElement.onclick = () => { if(!locked) renderer.domElement.requestPointerLock(); };
document.addEventListener('pointerlockchange',()=>{
  locked = document.pointerLockElement === renderer.domElement;
  document.getElementById('click-prompt').style.opacity = locked ? '0' : '1';
});
document.onmousemove = e => { if(!locked) return; tgtTh -= e.movementX*0.005; tgtPh = Math.max(0.15,Math.min(1.2,tgtPh+e.movementY*0.003)); };
document.onmousedown = e => {
  if(e.button!==0 || !drawn) return;
  if(!swinging) { swinging = true; swingT = 0; }
};
addEventListener('resize',()=>{ camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// === GAME LOOP ===
const clk = new THREE.Clock();
function anim() {
  requestAnimationFrame(anim);
  const dt = Math.min(clk.getDelta(),0.05);

  // Movement
  if(locked) {
    const spd = k['shift'] ? 5.5 : 3.5;
    const fwd = new THREE.Vector3(-Math.sin(th),0,-Math.cos(th));
    const rgt = new THREE.Vector3(Math.cos(th),0,-Math.sin(th));
    const md = new THREE.Vector3();
    if(k['w']) md.add(fwd);
    if(k['s']) md.sub(fwd);
    if(k['a']) md.sub(rgt);
    if(k['d']) md.add(rgt);
    if(md.length()>0){
      md.normalize();
      player.rotation.y = Math.atan2(md.x,md.z);
    }
    vel.x = md.x*spd;
    vel.z = md.z*spd;
    if(k[' ']&&onGround){ vel.y=jumpSpd; onGround=false; }
    vel.y += grav*dt;
    player.position.x += vel.x*dt;
    player.position.z += vel.z*dt;
    let gh = 0;
    [0.08,0.15,0.25].forEach((f,i)=>{
      gh += [Math.sin,Math.sin,Math.cos][i](player.position.x*f)*[Math.cos,Math.sin,Math.sin][i](player.position.z*f)*[1.2,0.8,0.4][i];
    });
    player.position.y += vel.y*dt;
    if(player.position.y<gh){
      player.position.y=gh; vel.y=0; onGround=true;
    }
    // bob
    const bobAmp = md.length()>0&&onGround ? (k['shift']?0.08:0.04) : 0;
    const ph2 = bobAmp>0 ? clk.elapsedTime*(k['shift']?12:8) : 0;
    for(const leg of player.children){
      if(leg===lLeg||leg===rLeg){
        // Find toe claws
      }
    }
  }

  // Sword
  if(drawn){
    swordGroup.position.lerp(drawPos,0.15);
    swordGroup.rotation.x += (drawRot.x-swordGroup.rotation.x)*0.15;
    swordGroup.rotation.y += (drawRot.y-swordGroup.rotation.y)*0.15;
    swordGroup.rotation.z += (drawRot.z-swordGroup.rotation.z)*0.15;
    if(swinging){
      swingT+=dt;
      const t = swingT/swingDur;
      let ang;
      if(t<0.5) ang = -0.8 + t*2.4;
      else ang = 0.4 + (t-0.5)*10;
      swordGroup.rotation.x = drawRot.x + ang;
      swordGroup.rotation.z = drawRot.z - ang*0.3;
      if(t>=1){ swinging=false; swingT=0; swordGroup.rotation.x=drawRot.x; swordGroup.rotation.z=drawRot.z; }
    }
  } else {
    swordGroup.position.lerp(sheathPos,0.15);
    swordGroup.rotation.x += (sheathRot.x-swordGroup.rotation.x)*0.15;
    swordGroup.rotation.y += (sheathRot.y-swordGroup.rotation.y)*0.15;
    swordGroup.rotation.z += (sheathRot.z-swordGroup.rotation.z)*0.15;
  }

  // HUD
  document.getElementById('sheath-status').innerHTML = drawn
    ? '<span style="color:#cc8844">⚔️ Katana Drawn</span>'
    : '<span style="color:#888">🗡️ Sheathed</span>';

  // Camera
  th += (tgtTh-th)*camSm;
  ph += (tgtPh-ph)*camSm;
  const cx = player.position.x + camDist*Math.sin(th)*Math.cos(ph);
  const cy = player.position.y + 1.3 + camDist*Math.sin(ph);
  const cz = player.position.z + camDist*Math.cos(th)*Math.cos(ph);
  camera.position.lerp(new THREE.Vector3(cx,cy,cz),0.15);
  camera.lookAt(player.position.x,player.position.y+0.8,player.position.z);

  renderer.render(scene,camera);
}

// Temporary: store refs for bob
const lLeg = player.children.find(c=>c.position.x<0&&c.children.some(ch=>ch.geometry&&ch.geometry.type==='CylinderGeometry'&&ch.position.y<0.15));
const rLeg = player.children.find(c=>c.position.x>0&&c.children.some(ch=>ch.geometry&&ch.geometry.type==='CylinderGeometry'&&ch.position.y<0.15));

anim();
