<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashfall</title>
<style>
  * { margin: 0; padding: 0; }
  body { overflow: hidden; background: #000; font-family: monospace; }
  canvas { display: block; }
  #hud {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 13px; text-align: center;
    pointer-events: none; user-select: none; text-shadow: 0 0 4px #000;
    background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 6px;
    line-height: 1.6;
  }
  #hud kbd {
    display: inline-block; background: rgba(255,255,255,0.15); 
    padding: 1px 6px; border-radius: 3px; font-size: 11px;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #health-bar {
    position: fixed; top: 20px; left: 20px; width: 200px; height: 16px;
    background: rgba(0,0,0,0.6); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
  }
  #health-fill {
    width: 100%; height: 100%;
    background: linear-gradient(90deg, #e74c3c, #e67e22);
    border-radius: 8px; transition: width 0.3s;
  }
  #health-label {
    position: fixed; top: 20px; left: 230px;
    color: rgba(255,255,255,0.5); font-size: 12px; font-family: monospace;
    line-height: 16px;
  }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    pointer-events: none;
  }
  #sheath-status {
    position: fixed; top: 50px; right: 20px;
    color: rgba(255,255,255,0.5); font-size: 12px; font-family: monospace;
    text-align: right; line-height: 1.6;
  }
</style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="health-bar"><div id="health-fill"></div></div>
  <div id="health-label">Vitality</div>
  <div id="sheath-status"></div>
  <div id="hud">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;|&nbsp; <kbd>Shift</kbd> Sprint &nbsp;|&nbsp; <kbd>Space</kbd> Jump &nbsp;|&nbsp; <kbd>LMB</kbd> Draw/Swing &nbsp;|&nbsp; <kbd>R</kbd> Sheathe &nbsp;|&nbsp; <kbd>P</kbd> 1st/3rd Person
  </div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// --- Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x333355, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xff9955, 1.8);
dirLight.position.set(30, 50, -20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x4466aa, 0.5);
fillLight.position.set(-20, 10, 30);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x884422, 0.3);
rimLight.position.set(0, 5, -30);
scene.add(rimLight);

// --- Ash Particles ---
const ashCount = 2000;
const ashGeo = new THREE.BufferGeometry();
const ashPos = new Float32Array(ashCount * 3);
const ashVel = new Float32Array(ashCount);
for (let i=0; i<ashCount; i++) {
  ashPos[i*3] = (Math.random()-0.5)*100;
  ashPos[i*3+1] = Math.random()*25;
  ashPos[i*3+2] = (Math.random()-0.5)*100;
  ashVel[i] = 0.3 + Math.random()*0.7;
}
ashGeo.setAttribute('position', new THREE.BufferAttribute(ashPos, 3));
const ashMat = new THREE.PointsMaterial({
  color: 0x888877, size: 0.08, transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending, depthWrite: false
});
const ashParticles = new THREE.Points(ashGeo, ashMat);
scene.add(ashParticles);

// --- Terrain ---
const terrainSize = 80;
const segments = 100;
const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
terrainGeo.rotateX(-Math.PI/2);
const pos = terrainGeo.attributes.position;
for (let i=0; i<pos.count; i++) {
  const x = pos.getX(i);
  const z = pos.getZ(i);
  let h = 0;
  h += Math.sin(x*0.05)*Math.sin(z*0.07)*2.5;
  h += Math.sin(x*0.12 + z*0.09)*1.2;
  h += Math.sin(x*0.25)*Math.cos(z*0.3)*0.6;
  pos.setY(i, h);
}
terrainGeo.computeVertexNormals();
const terrainMat = new THREE.MeshStandardMaterial({
  color: 0x3a3a3a, roughness: 0.9, metalness: 0.1,
  flatShading: false
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// Add a darker ash variation layer
const ashLayerGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
ashLayerGeo.rotateX(-Math.PI/2);
const ashPos2 = ashLayerGeo.attributes.position;
for (let i=0; i<ashPos2.count; i++) {
  const x = ashPos2.getX(i);
  const z = ashPos2.getZ(i);
  let h = 0;
  h += Math.sin(x*0.05)*Math.sin(z*0.07)*2.5;
  h += Math.sin(x*0.12 + z*0.09)*1.2;
  h += Math.sin(x*0.25)*Math.cos(z*0.3)*0.6;
  ashPos2.setY(i, h + 0.05);
}
ashLayerGeo.computeVertexNormals();
const ashLayerMat = new THREE.MeshStandardMaterial({
  color: 0x2a2a2a, roughness: 1, metalness: 0,
  transparent: true, opacity: 0.3
});
const ashLayer = new THREE.Mesh(ashLayerGeo, ashLayerMat);
ashLayer.receiveShadow = true;
scene.add(ashLayer);

// --- Scatter rocks, stumps, ruins ---
function scatterObjects() {
  const group = new THREE.Group();
  for (let i=0; i<120; i++) {
    const x = (Math.random()-0.5)*75;
    const z = (Math.random()-0.5)*75;
    if (Math.abs(x)<3 && Math.abs(z)<3) continue;
    
    // Get terrain height at this point
    let h = 0;
    h += Math.sin(x*0.05)*Math.sin(z*0.07)*2.5;
    h += Math.sin(x*0.12 + z*0.09)*1.2;
    h += Math.sin(x*0.25)*Math.cos(z*0.3)*0.6;
    
    const type = Math.random();
    let mesh;
    if (type < 0.5) {
      // Rock
      const rock = new THREE.DodecahedronGeometry(0.2 + Math.random()*0.6);
      mesh = new THREE.Mesh(rock, new THREE.MeshStandardMaterial({
        color: 0x555555, roughness: 0.9, metalness: 0.1
      }));
      mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
      mesh.scale.y = 0.4 + Math.random()*0.6;
    } else if (type < 0.75) {
      // Dead stump
      const stumpH = 0.3 + Math.random()*0.8;
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.25, stumpH, 6),
        new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 1 })
      );
      body.position.y = stumpH/2;
      const branch = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.05, 0.2 + Math.random()*0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 1 })
      );
      branch.position.set(
        (Math.random()-0.5)*0.2, stumpH + 0.1, (Math.random()-0.5)*0.2
      );
      branch.rotation.z = 0.3 + Math.random()*0.8;
      branch.rotation.x = (Math.random()-0.5)*0.5;
      mesh = new THREE.Group();
      mesh.add(body);
      mesh.add(branch);
    } else {
      // Small ruin fragment
      const arch = new THREE.BoxGeometry(0.2+Math.random()*0.3, 0.1+Math.random()*0.2, 0.2+Math.random()*0.3);
      mesh = new THREE.Mesh(arch, new THREE.MeshStandardMaterial({
        color: 0x6a5a4a, roughness: 0.8, metalness: 0.2
      }));
      mesh.rotation.set(Math.random()*0.3, Math.random()*6, Math.random()*0.3);
    }
    
    mesh.position.set(x, h, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    group.add(mesh);
  }
  return group;
}
scene.add(scatterObjects());

// --- Player (Cybernetic Wolf Warrior) ---
const player = new THREE.Group();

// Materials
const armorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.4, metalness: 0.6 });
const armorAccentMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.7 });
const redMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.5, metalness: 0.3, emissive: 0x661111, emissiveIntensity: 0.3 });
const skinMat = new THREE.MeshStandardMaterial({ color: 0xddaa88, roughness: 0.6 });
const hairMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.5, emissive: 0x888888, emissiveIntensity: 0.1 });
const capeMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.1, side: THREE.DoubleSide });
const scarfMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.7, metalness: 0.1, side: THREE.DoubleSide });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.3, metalness: 0.8 });
const glowMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff2222, emissiveIntensity: 0.5 });

// --- TORSO (armored breastplate) ---
const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.3, 0.5, 8), armorMat);
torso.position.y = 0.65;
torso.castShadow = true;
player.add(torso);

// Chest red accent (central core/emblem)
const chestCore = new THREE.Mesh(new THREE.CircleGeometry(0.06, 8), redMat);
chestCore.position.set(0, 0.7, -0.29);
player.add(chestCore);

// Shoulder pauldrons
const lPaul = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), armorMat);
lPaul.position.set(-0.32, 0.88, 0);
lPaul.scale.set(1, 0.6, 0.8);
lPaul.castShadow = true;
player.add(lPaul);

const rPaul = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 6), armorMat);
rPaul.position.set(0.32, 0.88, 0);
rPaul.scale.set(1, 0.6, 0.8);
rPaul.castShadow = true;
player.add(rPaul);

// Pauldron red trim
for (let side=-1; side<=1; side+=2) {
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.008, 4, 8), redMat);
  ring.position.set(side*0.32, 0.82, 0);
  ring.rotation.x = Math.PI/2;
  player.add(ring);
}

// --- WAIST / HIPS ---
const hips = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.15, 8), armorAccentMat);
hips.position.y = 0.4;
player.add(hips);

// Belt red accent
const belt = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.015, 4, 10), redMat);
belt.position.set(0, 0.45, 0);
belt.rotation.x = Math.PI/2;
player.add(belt);

// --- LEGS (digitigrade style with claws) ---
function makeLeg(side) {
  const leg = new THREE.Group();
  
  // Upper thigh armor
  const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.07, 0.25, 6), armorMat);
  thigh.position.y = 0.125;
  thigh.castShadow = true;
  leg.add(thigh);
  
  // Shin armor (slightly angled for digitigrade look)
  const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.065, 0.05, 0.2, 6), armorAccentMat);
  shin.position.set(0.02, -0.08, 0.05);
  shin.rotation.x = 0.2;
  shin.castShadow = true;
  leg.add(shin);
  
  // Ankle joint
  const ankle = new THREE.Mesh(new THREE.SphereGeometry(0.05, 5, 5), metalMat);
  ankle.position.set(0.03, -0.19, 0.07);
  leg.add(ankle);
  
  // Claw foot (talon) - 3 toes
  for (let t=-1; t<=1; t++) {
    const claw = new THREE.Mesh(
      new THREE.ConeGeometry(0.015, 0.08, 4),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.3 })
    );
    claw.position.set(0.02 + t*0.025, -0.24, 0.06 + t*0.02);
    claw.rotation.x = 0.3;
    leg.add(claw);
  }
  
  // Red leg accent line
  const linePts = [
    new THREE.Vector3(0.08, 0.05, 0),
    new THREE.Vector3(0.07, -0.05, 0.02),
    new THREE.Vector3(0.06, -0.15, 0.04)
  ];
  const lineGeo = new THREE.BufferGeometry().setFromPoints(linePts);
  const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xff2222 }));
  leg.add(line);
  
  leg.position.set(side*0.1, 0.15, 0);
  return leg;
}

const lLeg = makeLeg(-1);
player.add(lLeg);
const rLeg = makeLeg(1);
player.add(rLeg);

// --- ARMS (armored with claw gauntlets) ---
function makeArm(side, hasSword) {
  const arm = new THREE.Group();
  
  // Upper arm
  const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.05, 0.2, 6), armorMat);
  upper.position.y = 0.1;
  upper.castShadow = true;
  arm.add(upper);
  
  // Forearm plated
  const forearm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.035, 0.18, 6), armorAccentMat);
  forearm.position.set(0, -0.1, 0);
  forearm.castShadow = true;
  arm.add(forearm);
  
  // Gauntlet
  const gauntlet = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.03, 0.06, 6), metalMat);
  gauntlet.position.set(0, -0.2, 0);
  arm.add(gauntlet);
  
  // Claw fingers (3 per hand)
  for (let t=-1; t<=1; t++) {
    const claw = new THREE.Mesh(
      new THREE.ConeGeometry(0.008, 0.055, 4),
      new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 })
    );
    claw.position.set(t*0.025, -0.25, 0.01);
    claw.rotation.x = 0.5;
    arm.add(claw);
  }
  
  // Red accent on forearm
  const armRing = new THREE.Mesh(new THREE.TorusGeometry(0.04, 0.006, 4, 8), redMat);
  armRing.position.set(0, -0.05, 0);
  armRing.rotation.x = Math.PI/2;
  arm.add(armRing);
  
  arm.position.set(side*0.3, 0.6, 0);
  return arm;
}

const lArm = makeArm(-1, false);
player.add(lArm);
const rArm = makeArm(1, false);
player.add(rArm);

// --- HEAD & MASK ---
const headGroup = new THREE.Group();

// Head base
const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 8), armorMat);
head.scale.set(1, 0.9, 0.85);
head.castShadow = true;
headGroup.add(head);

// Wolf mask
const maskBase = new THREE.Mesh(new THREE.SphereGeometry(0.165, 8, 8), armorMat);
maskBase.scale.set(1, 0.8, 0.9);
maskBase.position.z = -0.02;
headGroup.add(maskBase);

// Mask snout
const snout = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.07, 5), armorMat);
snout.position.set(0, -0.02, -0.17);
snout.rotation.x = 0.3;
headGroup.add(snout);

// Mask red markings (two angular lines below eyes)
for (let s=-1; s<=1; s+=2) {
  const mark = new THREE.Mesh(
    new THREE.BoxGeometry(0.015, 0.003, 0.025),
    redMat
  );
  mark.position.set(s*0.06, -0.01, -0.15);
  mark.rotation.z = s*0.4;
  headGroup.add(mark);
  
  const mark2 = new THREE.Mesh(
    new THREE.BoxGeometry(0.008, 0.003, 0.02),
    redMat
  );
  mark2.position.set(s*0.04, -0.03, -0.16);
  mark2.rotation.z = s*0.3;
  headGroup.add(mark2);
}

// Fox/wolf ears
for (let s=-1; s<=1; s+=2) {
  const ear = new THREE.Mesh(
    new THREE.ConeGeometry(0.025, 0.07, 4),
    armorMat
  );
  ear.position.set(s*0.08, 0.16, 0);
  ear.rotation.x = -0.2;
  ear.rotation.z = s*0.3;
  ear.castShadow = true;
  headGroup.add(ear);
  
  // Inner ear red
  const inner = new THREE.Mesh(
    new THREE.ConeGeometry(0.012, 0.04, 4),
    redMat
  );
  inner.position.set(s*0.08, 0.15, 0.005);
  inner.rotation.x = -0.2;
  inner.rotation.z = s*0.3;
  headGroup.add(inner);
}

// Eyes (red glow)
for (let s=-1; s<=1; s+=2) {
  const eye = new THREE.Mesh(
    new THREE.SphereGeometry(0.015, 6, 6),
    glowMat
  );
  eye.position.set(s*0.05, 0.03, -0.16);
  headGroup.add(eye);
}

// White spiky hair
for (let i=0; i<7; i++) {
  const spike = new THREE.Mesh(
    new THREE.ConeGeometry(0.015 + Math.random()*0.01, 0.06 + Math.random()*0.06, 4),
    hairMat
  );
  const angle = (i/7) * Math.PI * 2;
  const r = 0.05 + Math.random()*0.04;
  spike.position.set(
    Math.cos(angle)*r,
    0.14 + Math.random()*0.04,
    Math.sin(angle)*r
  );
  spike.rotation.x = (Math.random()-0.5)*0.5;
  spike.rotation.z = (Math.random()-0.5)*0.5;
  headGroup.add(spike);
}

// Top spike
const topSpike = new THREE.Mesh(
  new THREE.ConeGeometry(0.02, 0.08, 4),
  hairMat
);
topSpike.position.set(0, 0.18, 0.02);
topSpike.castShadow = true;
headGroup.add(topSpike);

headGroup.position.y = 1.18;
player.add(headGroup);

// --- CAPE ---
const capeGroup = new THREE.Group();

// Back cape (tattered)
for (let i=0; i<4; i++) {
  const h = 0.3 + i*0.1;
  const w = 0.25 - i*0.02;
  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    capeMat
  );
  panel.position.set((i-1.5)*0.04, 0.6 - h/2 - 0.05, -0.25);
  panel.rotation.x = 0.15 + i*0.05;
  panel.rotation.y = (i-1.5)*0.08;
  capeGroup.add(panel);
}

// Red scarf around neck
const scarfParts = [
  { pos: [0, 0.9, 0], rot: [0, 0, 0], w: 0.35, h: 0.04 },
  { pos: [0.05, 0.88, -0.05], rot: [0.1, 0.2, 0.2], w: 0.25, h: 0.03 },
  { pos: [-0.05, 0.88, -0.05], rot: [0.1, -0.2, -0.2], w: 0.25, h: 0.03 },
  { pos: [0.1, 0.86, 0.05], rot: [0.3, 0.5, 0], w: 0.15, h: 0.04 },
];

for (const sp of scarfParts) {
  const s = new THREE.Mesh(
    new THREE.PlaneGeometry(sp.w, sp.h),
    scarfMat
  );
  s.position.set(sp.pos[0], sp.pos[1], sp.pos[2]);
  s.rotation.set(sp.rot[0], sp.rot[1], sp.rot[2]);
  capeGroup.add(s);
}

// Scarf tail flowing to the side
const tailPts = [
  new THREE.Vector3(0.08, 0.85, 0.02),
  new THREE.Vector3(0.18, 0.78, 0.08),
  new THREE.Vector3(0.28, 0.7, 0.12),
  new THREE.Vector3(0.35, 0.62, 0.1)
];
const tailGeo = new THREE.BufferGeometry().setFromPoints(tailPts.map(p => new THREE.Vector3(0,0,0)));
const tailLine = new THREE.Line(
  tailGeo,
  new THREE.LineBasicMaterial({ color: 0xcc2222 })
);
for (let i=0; i<tailPts.length-1; i++) {
  const seg = new THREE.Mesh(
    new THREE.CylinderGeometry(0.008, 0.005, 0.12 + i*0.02, 3),
    scarfMat
  );
  seg.position.set(
    (tailPts[i].x + tailPts[i+1].x)/2,
    (tailPts[i].y + tailPts[i+1].y)/2,
    (tailPts[i].z + tailPts[i+1].z)/2
  );
  const dx = tailPts[i+1].x - tailPts[i].x;
  const dy = tailPts[i+1].y - tailPts[i].y;
  seg.rotation.z = -Math.atan2(dx, dy);
  capeGroup.add(seg);
}

player.add(capeGroup);

// --- Katana ---
const swordGroup = new THREE.Group();

// Blade
const bladeShape = new THREE.Shape();
bladeShape.moveTo(-0.015, 0);
bladeShape.quadraticCurveTo(-0.02, 0.15, -0.005, 0.65);
bladeShape.quadraticCurveTo(0, 0.7, 0.005, 0.65);
bladeShape.quadraticCurveTo(0.02, 0.15, 0.015, 0);

const bladeExtrudeSettings = { depth: 0.005, bevelEnabled: true, bevelThickness: 0.005, bevelSize: 0.002, bevelSegments: 3 };
const bladeGeo = new THREE.ExtrudeGeometry(bladeShape, bladeExtrudeSettings);
const bladeMat = new THREE.MeshStandardMaterial({
  color: 0xcccccc, metalness: 0.9, roughness: 0.15, side: THREE.DoubleSide
});
const blade = new THREE.Mesh(bladeGeo, bladeMat);
blade.position.x = -0.3;
blade.position.y = 0.4;
blade.rotation.z = -0.15;
blade.castShadow = true;
swordGroup.add(blade);

// Blade edge glow (a thin line along the edge)
const edgePoints = [];
for (let t=0; t<=1; t+=0.05) {
  const y = t * 0.65;
  const x = -0.3 - 0.005;
  edgePoints.push(new THREE.Vector3(x, 0.4 + y, 0));
}
const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePoints);
const edgeMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
const edgeLine = new THREE.Line(edgeGeo, edgeMat);
swordGroup.add(edgeLine);

// Tsuba (guard)
const tsubaGeo = new THREE.CylinderGeometry(0.06, 0.07, 0.02, 12);
const tsubaMat = new THREE.MeshStandardMaterial({
  color: 0xccaa44, metalness: 0.8, roughness: 0.3
});
const tsuba = new THREE.Mesh(tsubaGeo, tsubaMat);
tsuba.position.set(-0.3, 0.38, 0);
tsuba.rotation.x = Math.PI/2;
tsuba.castShadow = true;
swordGroup.add(tsuba);

// Tsuka (handle)
const tsukaGeo = new THREE.CylinderGeometry(0.028, 0.03, 0.35, 8);
const tsukaMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a, roughness: 0.9, metalness: 0.1
});
const tsuka = new THREE.Mesh(tsukaGeo, tsukaMat);
tsuka.position.set(-0.3, 0.2, 0);
tsuka.castShadow = true;
swordGroup.add(tsuka);

// Handle wrap ridges
for (let i=0; i<6; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.03, 0.006, 4, 8),
    new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
  );
  ring.position.set(-0.3, 0.12 + i*0.045, 0);
  ring.rotation.x = Math.PI/2;
  swordGroup.add(ring);
}

// Pommel
const pommel = new THREE.Mesh(
  new THREE.SphereGeometry(0.025, 6, 6),
  new THREE.MeshStandardMaterial({ color: 0xccaa44, metalness: 0.7, roughness: 0.3 })
);
pommel.position.set(-0.3, 0.02, 0);
swordGroup.add(pommel);

// --- Scabbard (Saya) ---
const sayaGroup = new THREE.Group();

const sayaShape = new THREE.Shape();
sayaShape.moveTo(-0.025, 0);
sayaShape.quadraticCurveTo(-0.03, 0.2, -0.02, 0.6);
sayaShape.quadraticCurveTo(-0.015, 0.65, 0);
sayaShape.quadraticCurveTo(0.015, 0.65, 0.02, 0.6);
sayaShape.quadraticCurveTo(0.03, 0.2, 0.025, 0);

const sayaExtrude = { depth: 0.03, bevelEnabled: true, bevelThickness: 0.005, bevelSize: 0.003, bevelSegments: 3 };
const sayaGeo = new THREE.ExtrudeGeometry(sayaShape, sayaExtrude);
const sayaMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a0a, roughness: 0.8, metalness: 0.2, side: THREE.DoubleSide
});
const saya = new THREE.Mesh(sayaGeo, sayaMat);
saya.position.set(0.25, 0.1, 0);
saya.rotation.z = 0.1;
saya.castShadow = true;
sayaGroup.add(saya);

// Dragon pattern on scabbard (simple lines)
for (let i=0; i<3; i++) {
  const dScale = 0.3 + i*0.15;
  const dragonPoints = [];
  for (let t=0; t<=1; t+=0.05) {
    const angle = t * Math.PI * 4;
    const yOff = 0.15 + t * 0.35;
    const xOff = 0.25 + Math.sin(angle) * 0.008 * dScale;
    dragonPoints.push(new THREE.Vector3(xOff, 0.1 + yOff, 0.016));
  }
  const dGeo = new THREE.BufferGeometry().setFromPoints(dragonPoints);
  const dMat = new THREE.LineBasicMaterial({ color: 0x886644, transparent: true, opacity: 0.4 });
  const dLine = new THREE.Line(dGeo, dMat);
  sayaGroup.add(dLine);
}

// Saya cord
const cordPoints = [];
for (let t=0; t<=1; t+=0.1) {
  const yOff = 0.15 + t * 0.35;
  const xBase = 0.25;
  const zOff = Math.sin(t * Math.PI * 6) * 0.01;
  cordPoints.push(new THREE.Vector3(xBase + 0.03, 0.1 + yOff, zOff));
}
const cordGeo = new THREE.BufferGeometry().setFromPoints(cordPoints);
const cordMat = new THREE.LineBasicMaterial({ color: 0x664422 });
const cordLine = new THREE.Line(cordGeo, cordMat);
sayaGroup.add(cordLine);

// Position scabbard on left hip
sayaGroup.position.set(-0.15, 0.35, 0.1);
sayaGroup.rotation.x = 0.2;
sayaGroup.rotation.z = -0.3;
player.add(sayaGroup);

// Add sword to right hand position (sheathed)
swordGroup.position.set(0.35, 0.55, 0);
swordGroup.rotation.z = -0.5;
swordGroup.rotation.x = 0.3;
player.add(swordGroup);

// Also add a copy to the sheath position for when drawn
// Actually, just move the sword. We'll handle draw/sheath by repositioning.

// Player physics
const velocity = new THREE.Vector3();
const gravity = -15;
const jumpSpeed = 6;
let isOnGround = true;
let health = 100;
const maxHealth = 100;

// State
let isSwordDrawn = false;
let isSwinging = false;
let swingTime = 0;
const swingDuration = 0.3;
const sheathedPos = new THREE.Vector3(0.35, 0.55, 0);
const sheathedRot = new THREE.Euler(-0.5, 0, 0.3);
const drawnPos = new THREE.Vector3(0.45, 0.5, 0.15);
const drawnRot = new THREE.Euler(-0.2, 0.2, -0.3);

// --- Camera ---
let camTheta = 0;
let camPhi = 0.4;
const camThirdDistance = 5;
const camSmooth = 0.1;
let camTargetTheta = 0;
let camTargetPhi = 0.4;

// --- Input ---
const keys = {};
let isPointerLocked = false;
let mouseDown = false;

document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'r' || e.key === 'R') {
    if (isSwordDrawn && !isSwinging) {
      isSwordDrawn = false;
    }
  }
});
document.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

renderer.domElement.addEventListener('click', () => {
  if (!isPointerLocked) {
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  isPointerLocked = document.pointerLockElement === renderer.domElement;
});

document.addEventListener('mousemove', (e) => {
  if (!isPointerLocked) return;
  camTargetTheta -= e.movementX * 0.005;
  camTargetPhi = Math.max(0.1, Math.min(1.2, camTargetPhi + e.movementY * 0.003));
});

document.addEventListener('mousedown', (e) => {
  if (e.button === 0) {
    mouseDown = true;
    if (!isSwordDrawn) {
      isSwordDrawn = true;
      isSwinging = true;
      swingTime = 0;
    } else if (!isSwinging) {
      isSwinging = true;
      swingTime = 0;
    }
  }
});
document.addEventListener('mouseup', (e) => {
  if (e.button === 0) mouseDown = false;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Game Loop ---
const clock = new THREE.Clock();

function updatePlayer(dt) {
  if (!isPointerLocked) return;
  
  // Movement
  const speed = keys['shift'] ? 5 : 3;
  const forward = new THREE.Vector3(-Math.sin(camTheta), 0, -Math.cos(camTheta));
  const right = new THREE.Vector3(Math.cos(camTheta), 0, -Math.sin(camTheta));
  
  const moveDir = new THREE.Vector3();
  if (keys['w']) moveDir.add(forward);
  if (keys['s']) moveDir.sub(forward);
  if (keys['a']) moveDir.sub(right);
  if (keys['d']) moveDir.add(right);
  
  if (moveDir.length() > 0) {
    moveDir.normalize();
    // Rotate player to face movement direction
    const targetRot = Math.atan2(moveDir.x, moveDir.z);
    player.rotation.y = targetRot;
  }
  
  // Horizontal movement
  velocity.x = moveDir.x * speed;
  velocity.z = moveDir.z * speed;
  
  // Jump
  if (keys[' '] && isOnGround) {
    velocity.y = jumpSpeed;
    isOnGround = false;
  }
  
  // Gravity
  velocity.y += gravity * dt;
  
  // Move
  player.position.x += velocity.x * dt;
  player.position.z += velocity.z * dt;
  
  // Ground collision
  const px = player.position.x;
  const pz = player.position.z;
  let groundH = 0;
  groundH += Math.sin(px*0.05)*Math.sin(pz*0.07)*2.5;
  groundH += Math.sin(px*0.12 + pz*0.09)*1.2;
  groundH += Math.sin(px*0.25)*Math.cos(pz*0.3)*0.6;
  
  player.position.y += velocity.y * dt;
  if (player.position.y < groundH) {
    player.position.y = groundH;
    velocity.y = 0;
    isOnGround = true;
  }
  
  // -- Bobbin' legs --
  if (moveDir.length() > 0 && isOnGround) {
    const bobSpeed = keys['shift'] ? 12 : 8;
    const bobAmp = keys['shift'] ? 0.08 : 0.04;
    const phase = clock.elapsedTime * bobSpeed;
    lLeg.position.y = 0.2 + Math.sin(phase) * bobAmp;
    rLeg.position.y = 0.2 + Math.sin(phase + Math.PI) * bobAmp;
  } else {
    lLeg.position.y = 0.2;
    rLeg.position.y = 0.2;
  }
  
  // --- Sword handling ---
  if (isSwordDrawn) {
    // Move to drawn position
    swordGroup.position.lerp(drawnPos, 0.15);
    swordGroup.rotation.x += (drawnRot.x - swordGroup.rotation.x) * 0.15;
    swordGroup.rotation.y += (drawnRot.y - swordGroup.rotation.y) * 0.15;
    swordGroup.rotation.z += (drawnRot.z - swordGroup.rotation.z) * 0.15;
    
    if (isSwinging) {
      swingTime += dt;
      const t = swingTime / swingDuration;
      
      // Swing arc
      let angle;
      if (t < 0.5) {
        angle = -0.8 + t * 2.4; // Wind up
      } else {
        angle = 0.4 + (t-0.5) * 10; // Slash through
      }
      swordGroup.rotation.x = drawnRot.x + angle;
      swordGroup.rotation.z = drawnRot.z - angle * 0.3;
      
      if (t >= 1) {
        isSwinging = false;
        swingTime = 0;
        swordGroup.rotation.x = drawnRot.x;
        swordGroup.rotation.z = drawnRot.z;
      }
    }
  } else {
    // Move to sheathed position
    swordGroup.position.lerp(sheathedPos, 0.15);
    swordGroup.rotation.x += (sheathedRot.x - swordGroup.rotation.x) * 0.15;
    swordGroup.rotation.y += (sheathedRot.y - swordGroup.rotation.y) * 0.15;
    swordGroup.rotation.z += (sheathedRot.z - swordGroup.rotation.z) * 0.15;
  }
  
  // Update HUD
  const statusEl = document.getElementById('sheath-status');
  if (isSwordDrawn) {
    statusEl.innerHTML = `<span style="color:#cc8844">⚔️ Katana Drawn</span>`;
  } else {
    statusEl.innerHTML = `<span style="color:#666">🗡️ Sheathed</span>`;
  }
}

// --- Render ---
function animate() {
  requestAnimationFrame(animate);
  
  const dt = Math.min(clock.getDelta(), 0.05);
  
  updatePlayer(dt);
  
  // Smooth camera
  camTheta += (camTargetTheta - camTheta) * camSmooth;
  camPhi += (camTargetPhi - camPhi) * camSmooth;
  
  const camX = player.position.x + camThirdDistance * Math.sin(camTheta) * Math.cos(camPhi);
  const camY = player.position.y + 1.2 + camThirdDistance * Math.sin(camPhi);
  const camZ = player.position.z + camThirdDistance * Math.cos(camTheta) * Math.cos(camPhi);
  
  camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.15);
  camera.lookAt(player.position.x, player.position.y + 0.8, player.position.z);
  
  // Update ash particles
  const ashPosAttr = ashParticles.geometry.attributes.position;
  const positions = ashPosAttr.array;
  for (let i=0; i<ashCount; i++) {
    positions[i*3+1] -= ashVel[i] * dt * 1.5;
    positions[i*3] += Math.sin(clock.elapsedTime + i) * 0.01;
    positions[i*3+2] += Math.cos(clock.elapsedTime*0.7 + i*0.5) * 0.01;
    if (positions[i*3+1] < -2) {
      positions[i*3+1] = 20 + Math.random()*5;
      positions[i*3] = (Math.random()-0.5)*100;
      positions[i*3+2] = (Math.random()-0.5)*100;
    }
  }
  ashPosAttr.needsUpdate = true;
  
  renderer.render(scene, camera);
}

animate();

// --- Pointer lock hint ---
const hud = document.getElementById('hud');
const origText = hud.innerHTML;
if (!isPointerLocked) {
  const hint = document.createElement('div');
  hint.id = 'lock-hint';
  hint.style.cssText = `
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: rgba(255,255,255,0.4); font-size: 16px; font-family: monospace;
    text-align: center; pointer-events: none;
    text-shadow: 0 0 8px #000;
  `;
  hint.textContent = 'Click to play';
  document.body.appendChild(hint);
}

document.addEventListener('pointerlockchange', () => {
  const hint = document.getElementById('lock-hint');
  if (isPointerLocked && hint) {
    hint.remove();
  } else if (!isPointerLocked && !document.getElementById('lock-hint')) {
    const h = document.createElement('div');
    h.id = 'lock-hint';
    h.style.cssText = `
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: rgba(255,255,255,0.4); font-size: 16px; font-family: monospace;
      text-align: center; pointer-events: none;
      text-shadow: 0 0 8px #000;
    `;
    h.textContent = 'Click to play';
    document.body.appendChild(h);
  }
});

console.log('🔥 Ashfall loaded');
</script>
