<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JJK RPG - Gojo Satoru</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:Segoe UI,sans-serif;overflow:hidden}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;padding:16px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.panel{background:rgba(0,0,0,.7);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 16px;min-width:140px}
.stat{margin-bottom:8px}
.stat-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.bar-bg{background:rgba(255,255,255,.1);border-radius:4px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .1s}
.hp-fill{background:linear-gradient(90deg,#ff4444,#ff6666)}
.ce-fill{background:linear-gradient(90deg,#00b4ff,#00d4ff)}
.boss-bar{background:rgba(0,0,0,.85);border:1px solid rgba(255,50,50,.5);border-radius:8px;padding:10px 20px;min-width:300px;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:none;z-index:10}
.boss-name{font-size:13px;font-weight:700;color:#ff5555;text-transform:uppercase;letter-spacing:3px;margin-bottom:6px;text-align:center}
.boss-hp-bg{background:rgba(255,255,255,.1);border-radius:4px;height:16px;overflow:hidden}
.boss-hp-fill{background:linear-gradient(90deg,#cc1111,#ff4444);height:100%;transition:width .3s;border-radius:4px}
.boss-phase{font-size:10px;color:#888;text-align:center;margin-top:4px;letter-spacing:2px}
.controls{position:fixed;bottom:16px;left:16px;background:rgba(0,0,0,.7);border:1px solid rgba(0,180,255,.3);border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.8;z-index:10}
.controls-title{color:#00b4ff;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.key{display:inline-block;background:rgba(255,255,255,.15);padding:2px 6px;border-radius:3px;font-weight:700;margin:0 2px}
.notif{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border:1px solid rgba(0,180,255,.5);color:#00b4ff;padding:10px 24px;border-radius:6px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:20;text-align:center;white-space:nowrap}
.notif.show{opacity:1}
.notif.boss-alert{color:#ff4444;border-color:rgba(255,50,50,.7);font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 20px rgba(255,50,50,.5)}
.wave-announce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;font-weight:900;color:#ff4444;text-transform:uppercase;letter-spacing:8px;opacity:0;transition:opacity .4s;pointer-events:none;z-index:50;text-shadow:0 0 60px rgba(255,50,50,.7)}
.wave-announce.show{opacity:1}
#game-over{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#game-over.show{display:flex}
#game-over h1{color:#ff4444;font-size:56px;margin-bottom:16px;text-transform:uppercase;letter-spacing:6px}
#game-over .final-score{color:#fff;font-size:22px;margin-bottom:30px}
#game-over button{background:#00b4ff;color:#000;border:none;padding:14px 36px;font-size:18px;font-weight:700;border-radius:6px;cursor:pointer;text-transform:uppercase;margin:6px}
#game-over button:hover{background:#00d4ff}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
 <div class="panel">
 <div class="stat"><div class="stat-label">Health</div><div class="bar-bg"><div class="bar-fill hp-fill" id="hp-bar" style="width:100%"></div></div></div>
 <div class="stat"><div class="stat-label">Cursed Energy</div><div class="bar-bg"><div class="bar-fill ce-fill" id="ce-bar" style="width:100%"></div></div></div>
 </div>
 <div class="panel"><div class="stat"><div class="stat-label">Score</div><div id="score" style="font-size:22px;font-weight:700;color:#00b4ff">0</div></div></div>
 <div class="panel"><div class="stat"><div class="stat-label">Wave</div><div id="wave" style="font-size:22px;font-weight:700;color:#ff5555">1</div></div></div>
</div>
<div class="boss-bar" id="boss-bar">
 <div class="boss-name" id="boss-name">BOSS</div>
 <div class="boss-hp-bg"><div class="boss-hp-fill" id="boss-hp-fill" style="width:100%"></div></div>
 <div class="boss-phase" id="boss-phase">PHASE 1</div>
</div>
<div class="controls">
 <div class="controls-title">Controls</div>
 <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Move</div>
 <div><span class="key">MOUSE</span> Aim</div>
 <div><span class="key">Q</span> Max Blue | <span class="key">E</span> Red | <span class="key">R</span> Purple</div>
 <div><span class="key">F</span> Blue Shot | <span class="key">G</span> Domain</div>
</div>
<div class="notif" id="notif"></div>
<div class="wave-announce" id="wave-announce"></div>
<div id="game-over"><h1>Game Over</h1><div class="final-score" id="final-score"></div><button onclick="respawn()">Respawn</button></div>
<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const P = { x:0, y:0, angle:0, spd:3.5, hp:100, maxHp:100, ce:100, maxCe:100, dead:false, locked:false, iframes:0 };
let cam = { x:0, y:0 };
let keys = {};
let mouse = { x:0, y:0 };
let enemies = [];
let orbs = [];
let particles = [];
let damages = [];
let projectiles = [];
let screenShake = 0;
let score = 0;
let wave = 1;
let waveKills = 0;
let killsPerWave = 5;
let boss = null;
let bossActive = false;
let bossBar = document.getElementById('boss-bar');
let waveAnnounce = document.getElementById('wave-announce');

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('keydown', e => {
  if (P.dead) return;
  const k = e.key.toLowerCase();
  if (k === 'q') maxBlue();
  if (k === 'e') chargeRed();
  if (k === 'r') chargePurple();
  if (k === 'f') blueShot();
  if (k === 'g') domain();
});

function showNotif(t, isBoss) {
  const n = document.getElementById('notif');
  n.textContent = t;
  n.className = 'notif' + (isBoss ? ' boss-alert' : '');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 2500);
}

function announceWave(t, callback) {
  waveAnnounce.textContent = t;
  waveAnnounce.classList.add('show');
  setTimeout(() => {
    waveAnnounce.classList.remove('show');
    if (callback) setTimeout(callback, 200);
  }, 2000);
}

function updateUI() {
  document.getElementById('hp-bar').style.width = (P.hp / P.maxHp * 100) + '%';
  document.getElementById('ce-bar').style.width = (P.ce / P.maxCe * 100) + '%';
  document.getElementById('score').textContent = score;
  document.getElementById('wave').textContent = wave;
  if (boss && bossActive) {
    document.getElementById('boss-name').textContent = boss.name;
    document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + '%';
    document.getElementById('boss-phase').textContent = 'PHASE ' + (boss.phase || 1);
  }
}

function spawnParticles(x, y, col, count, spd, size) {
  if (size === undefined) size = 3;
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd * (0.5 + Math.random() * 0.5),
      vy: Math.sin(ang) * spd * (0.5 + Math.random() * 0.5),
      life: 0.4 + Math.random() * 0.6,
      col, r: size + Math.random() * 3,
      decay: 0.92
    });
  }
}

function spawnDamage(x, y, val, col) {
  damages.push({ x, y, val, life: 1, col, size: 18, vy: -1.5 });
}

function maxBlue() {
  if (P.ce < 30) { showNotif('Not enough CE!'); return; }
  for (const o of orbs) { if (o.type === 'maxblue') { showNotif('Max Blue already active!'); return; } }
  P.ce -= 30;
  screenShake = 20;
  orbs.push({
    x: P.x, y: P.y, vx:0, vy:0, life:500, col:'#00b4ff', r:30, dmg:40,
    type: 'maxblue', orbit:0, speed:0.012, pulse:0, shockwave:0, corePulse:0, sparkleTimer:0
  });
  for (let ring = 0; ring < 6; ring++) {
    setTimeout(() => {
      for (let i = 0; i < 40; i++) {
        const ang = (i / 40) * Math.PI * 2;
        const rc = ring === 0 ? '#ffffff' : (ring < 3 ? '#aaddff' : '#0055cc');
        particles.push({
          x: P.x + Math.cos(ang) * (20 + ring * 18),
          y: P.y + Math.sin(ang) * (20 + ring * 18),
          vx: Math.cos(ang) * (7 - ring * 0.8),
          vy: Math.sin(ang) * (7 - ring * 0.8),
          life: 1.5, col: rc, r: 10 - ring, decay: 0.95
        });
      }
    }, ring * 100);
  }
  showNotif('INFINITY: MAXIMUM OUTPUT BLUE', true);
}

function blueShot() {
  if (P.ce < 10) { showNotif('Not enough CE!'); return; }
  P.ce -= 10;
  const vx = Math.cos(P.angle) * 10;
  const vy = Math.sin(P.angle) * 10;
  orbs.push({ x: P.x + vx * 3, y: P.y + vy * 3, vx, vy, life:50, col:'#00b4ff', r:8, dmg:20, type:'blueshot' });
  spawnParticles(P.x, P.y, '#00b4ff', 8, 3);
}

function chargeRed() {
  if (P.ce < 20) { showNotif('Not enough CE!'); return; }
  P.locked = true;
  P.ce -= 20;
  let charge = 0;
  const interval = setInterval(() => {
    charge++;
    const ang = Math.random() * Math.PI * 2;
    particles.push({ x: P.x + Math.cos(ang) * 25, y: P.y + Math.sin(ang) * 25, vx: Math.cos(ang) * 2.5, vy: Math.sin(ang) * 2.5, life: 0.3, col: '#ff4444', r: 5 });
    if (charge >= 60) {
      clearInterval(interval);
      const vx = Math.cos(P.angle) * 12;
      const vy = Math.sin(P.angle) * 12;
      orbs.push({ x: P.x + vx * 4, y: P.y + vy * 4, vx, vy, life:40, col:'#ff4444', r:12, dmg:60, type:'red' });
      spawnParticles(P.x + vx * 4, P.y + vy * 4, '#ff4444', 15, 5, 5);
      P.locked = false;
    }
  }, 16);
}

function chargePurple() {
  if (P.ce < 40) { showNotif('Not enough CE!'); return; }
  P.locked = true;
  P.ce -= 40;
  let charge = 0;
  const interval = setInterval(() => {
    charge++;
    const offset = (1 - charge / 90) * 40;
    const ang1 = Math.random() * Math.PI * 2;
    const ang2 = ang1 + Math.PI;
    particles.push({ x: P.x + Math.cos(ang1) * offset, y: P.y + Math.sin(ang1) * offset, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, life: 0.4, col: '#ff4444', r: 4 });
    particles.push({ x: P.x + Math.cos(ang2) * offset, y: P.y + Math.sin(ang2) * offset, vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2, life: 0.4, col: '#00b4ff', r: 4 });
    if (charge >= 90) {
      clearInterval(interval);
      const vx = Math.cos(P.angle) * 6;
      const vy = Math.sin(P.angle) * 6;
      orbs.push({ x: P.x + vx * 5, y: P.y + vy * 5, vx, vy, life:200, col:'#800080', r:15, dmg:200, type:'purple', pierce:true });
      spawnParticles(P.x + vx * 5, P.y + vy * 5, '#800080', 25, 6, 6);
      P.locked = false;
    }
  }, 16);
}

function domain() {
  if (P.ce < 80) { showNotif('Not enough CE!'); return; }
  P.ce -= 80;
  P.locked = true;
  screenShake = 30;
  for (let i = 0; i < 60; i++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 350;
    particles.push({ x: P.x + Math.cos(ang) * dist, y: P.y + Math.sin(ang) * dist, vx:0, vy:0, life:2.5, col:'#4a0080', r:4 + Math.random() * 4, decay:0.95 });
  }
  if (boss && bossActive) {
    boss.hp -= 80;
    boss.stun = 180;
    spawnDamage(boss.x, boss.y - 40, 80, '#a050ff');
  }
  for (const e of enemies) {
    e.hp -= 50;
    e.stun = Math.max(e.stun, 120);
    spawnDamage(e.x, e.y - 20, 50, '#a050ff');
  }
  setTimeout(() => { P.locked = false; }, 2500);
}

function spawnEnemy() {
  const ang = Math.random() * Math.PI * 2;
  const dist = 600 + Math.random() * 600;
  const x = P.x + Math.cos(ang) * dist;
  const y = P.y + Math.sin(ang) * dist;
  const types = [
    { n:'Grade 4', hp:30, col:'#44bb44', spd:0.8, r:15, aggro:250, shape:'blob', score:30 },
    { n:'Grade 3', hp:60, col:'#ffaa44', spd:1.0, r:18, aggro:300, shape:'horned', score:60 },
    { n:'Grade 2', hp:120, col:'#cc55ff', spd:1.3, r:22, aggro:350, shape:'demon', score:120 }
  ];
  const t = types[Math.floor(Math.random() * types.length)];
  enemies.push({ x, y, hp:t.hp, maxHp:t.hp, col:t.col, spd:t.spd, r:t.r, name:t.n, stun:0, aggro:t.aggro, state:'idle', shape:t.shape, score:t.score });
}

const BOSSES = [
  {
    name: 'JOGO', hp:800, col:'#ff6600', spd:2.0, r:35, score:500, phase2Hp:400, phase3Hp:0,
    attacks: ['fireball', 'meteor', 'groundBurst'],
    fireball: function() {
      const ang = Math.atan2(P.y - this.y, P.x - this.x);
      projectiles.push({ x:this.x, y:this.y, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5, r:14, col:'#ff6600', dmg:12, life:120, type:'fireball' });
    },
    meteor: function() {
      screenShake = 10;
      for (let i = 0; i < 8; i++) {
        const ang = Math.random() * Math.PI * 2;
        const dist = 150 + Math.random() * 200;
        const tx = this.x + Math.cos(ang) * dist;
        const ty = this.y + Math.sin(ang) * dist;
        projectiles.push({ x:tx, y:ty - 400, vx:0, vy:8, r:22, col:'#ff3300', dmg:20, life:200, type:'meteor', trail:true });
      }
    },
    groundBurst: function() {
      const dist = Math.hypot(P.x - this.x, P.y - this.y);
      if (dist < 300) { P.hp -= 10; P.iframes = 30; }
    },
    phase2Effects: function() {
      this.spd = 2.5;
      this.col = '#ff2200';
      for (let i = 0; i < 20; i++) {
        const ang = Math.random() * Math.PI * 2;
        particles.push({ x:this.x + Math.cos(ang) * 50, y:this.y + Math.sin(ang) * 50, vx:Math.cos(ang)*3, vy:Math.sin(ang)*3, life:0.8, col:'#ff4400', r:6, decay:0.92 });
      }
    }
  },
  {
    name: 'MAHITO', hp:900, col:'#aa44ff', spd:1.8, r:32, score:600, phase2Hp:450, phase3Hp:0,
    attacks: ['idleTrans', 'soulSpark', 'shapesmite'],
    idleTrans: function() {
      if (Math.random() < 0.03) spawnEnemy();
    },
    soulSpark: function() {
      const ang = Math.atan2(P.y - this.y, P.x - this.x);
      for (let i = 0; i < 5; i++) {
        const spread = ang + (i - 2) * 0.15;
        projectiles.push({ x:this.x, y:this.y, vx:Math.cos(spread)*6, vy:Math.sin(spread)*6, r:8, col:'#dd88ff', dmg:10, life:80, type:'soulSpark' });
      }
    },
    shapesmite: function() {
      if (this.slammed) return;
      this.slammed = true;
      const self = this;
      setTimeout(function() {
        screenShake = 15;
        for (let i = 0; i < 30; i++) {
          const ang = (i / 30) * Math.PI * 2;
          particles.push({ x:self.x + Math.cos(ang) * 100, y:self.y + Math.sin(ang) * 100, vx:Math.cos(ang)*4, vy:Math.sin(ang)*4, life:0.8, col:'#aa44ff', r:6, decay:0.92 });
        }
        const dist = Math.hypot(P.x - self.x, P.y - self.y);
        if (dist < 120) { P.hp -= 18; P.iframes = 40; }
        self.slammed = false;
      }, 700);
    },
    phase2Effects: function() {
      this.spd = 2.2;
      this.col = '#cc00ff';
      for (let i = 0; i < 15; i++) {
        const ang = Math.random() * Math.PI * 2;
        particles.push({ x:this.x + Math.cos(ang) * 40, y:this.y + Math.sin(ang) * 40, vx:Math.cos(ang)*4, vy:Math.sin(ang)*4, life:0.7, col:'#ff44ff', r:5, decay:0.92 });
      }
    }
  },
  {
    name: 'SUKUNA', hp:1500, col:'#800080', spd:2.2, r:40, score:1000, phase2Hp:750, phase3Hp:375,
    attacks: ['cleave', 'dismantle', 'fireArrow', 'domain'],
    cleave: function() {
      const dirs = [[1,0],[-1,0],[0,1],[0,-1],[0.707,0.707],[0.707,-0.707],[-0.707,0.707],[-0.707,-0.707]];
      for (let k = 0; k < dirs.length; k++) {
        const d = dirs[k];
        projectiles.push({ x:this.x, y:this.y, vx:d[0]*7, vy:d[1]*7, r:10, col:'#800080', dmg:12, life:60, type:'cleave' });
      }
    },
    dismantle: function() {
      const ang = Math.atan2(P.y - this.y, P.x - this.x);
      for (let i = 0; i < 10; i++) {
        const a = ang + (i - 5) * 0.18;
        projectiles.push({ x:this.x, y:this.y, vx:Math.cos(a)*9, vy:Math.sin(a)*9, r:8, col:'#aa00aa', dmg:8, life:70, type:'dismantle' });
      }
    },
    fireArrow: function() {
      projectiles.push({ x:this.x, y:this.y, vx:0, vy:-1, r:0, col:'#ff4400', dmg:25, life:999, type:'fireArrow', angle:Math.atan2(P.y - this.y, P.x - this.x), speed:4, spin:0 });
    },
    domain: function() {
      screenShake = 25;
      for (let i = 0; i < 60; i++) {
        const ang = (i / 60) * Math.PI * 2;
        particles.push({ x:this.x + Math.cos(ang) * 250, y:this.y + Math.sin(ang) * 250, vx:0, vy:0, life:3, col:'#200020', r:6, decay:0.97 });
      }
      const dist = Math.hypot(P.x - this.x, P.y - this.y);
      if (dist < 220) { P.hp -= 30; P.iframes = 60; }
    },
    phase2Effects: function() {
      this.spd = 2.7;
      this.col = '#600060';
      this.r = 45;
      for (let i = 0; i < 25; i++) {
        const ang = Math.random() * Math.PI * 2;
        particles.push({ x:this.x + Math.cos(ang) * 45, y:this.y + Math.sin(ang) * 45, vx:Math.cos(ang)*5, vy:Math.sin(ang)*5, life:0.8, col:'#aa00aa', r:6, decay:0.92 });
      }
    },
    phase3Effects: function() {
      this.spd = 3.2;
      this.col = '#ff00ff';
      this.r = 50;
      for (let i = 0; i < 35; i++) {
        const ang = Math.random() * Math.PI * 2;
        particles.push({ x:this.x + Math.cos(ang) * 55, y:this.y + Math.sin(ang) * 55, vx:Math.cos(ang)*6, vy:Math.sin(ang)*6, life:0.9, col:'#ff44ff', r:7, decay:0.92 });
      }
    }
  }
];

function spawnBoss() {
  const bDef = BOSSES[Math.floor(Math.random() * BOSSES.length)];
  const ang = Math.random() * Math.PI * 2;
  const dist = 500;
  boss = {
    name: bDef.name, hp: bDef.hp, maxHp: bDef.hp, col: bDef.col,
    spd: bDef.spd, r: bDef.r, score: bDef.score,
    phase2Hp: bDef.phase2Hp, phase3Hp: bDef.phase3Hp,
    attacks: bDef.attacks,
    fireball: bDef.fireball, meteor: bDef.meteor, groundBurst: bDef.groundBurst,
    idleTrans: bDef.idleTrans, soulSpark: bDef.soulSpark, shapesmite: bDef.shapesmite,
    cleave: bDef.cleave, dismantle: bDef.dismantle, fireArrow: bDef.fireArrow,
    domain: bDef.domain,
    phase2Effects: bDef.phase2Effects, phase3Effects: bDef.phase3Effects,
    x: P.x + Math.cos(ang) * dist, y: P.y + Math.sin(ang) * dist,
    hp: bDef.hp, maxHp: bDef.hp, phase: 1, attackTimer: 0, nextAttack: 100, stun: 0
  };
  bossActive = true;
  bossBar.style.display = 'block';
  announceWave('! ' + bDef.name + ' APPROACHING !', function() {
    showNotif(boss.name + ' HAS APPEARED!', true);
  });
  updateUI();
}

function bossUpdate() {
  if (!boss || !bossActive) return;
  if (boss.stun > 0) { boss.stun--; return; }
  boss.attackTimer++;
  if (boss.attackTimer >= boss.nextAttack) {
    boss.attackTimer = 0;
    boss.nextAttack = 80 + Math.random() * 80;
    const atk = boss.attacks[Math.floor(Math.random() * boss.attacks.length)];
    if (boss[atk]) boss[atk]();
  }
  if (boss.phase === 1 && boss.hp <= boss.phase2Hp && boss.phase2Hp > 0) {
    boss.phase = 2;
    if (boss.phase2Effects) boss.phase2Effects();
    showNotif(boss.name + ' -- PHASE 2!', true);
    screenShake = 20;
  }
  if (boss.phase2Hp > 0 && boss.phase === 2 && boss.hp <= boss.phase3Hp && boss.phase3Hp > 0) {
    boss.phase = 3;
    if (boss.phase3Effects) boss.phase3Effects();
    showNotif(boss.name + ' -- FINAL PHASE!', true);
    screenShake = 25;
  }
}

function bossDie() {
  score += boss.score;
  const bx = boss.x;
  const by = boss.y;
  bossActive = false;
  boss = null;
  bossBar.style.display = 'none';
  spawnParticles(bx, by, '#ffffff', 50, 8, 8);
  spawnParticles(bx, by, '#ff00ff', 30, 6, 6);
  screenShake = 40;
  showNotif('BOSS DEFEATED! +' + boss.score + ' SCORE');
  wave++;
  killsPerWave = Math.floor(killsPerWave * 1.5);
  waveKills = 0;
  setTimeout(nextWave, 3000);
}

function nextWave() {
  announceWave('-- WAVE ' + wave + ' --');
}

function respawn() {
  P.x = 0; P.y = 0; P.hp = P.maxHp; P.ce = P.maxCe;
  P.dead = false; P.locked = false; P.iframes = 0;
  enemies = []; orbs = []; particles = []; damages = []; projectiles = [];
  score = 0; wave = 1; waveKills = 0; killsPerWave = 5;
  boss = null; bossActive = false;
  bossBar.style.display = 'none';
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('final-score').textContent = '';
  updateUI();
  nextWave();
}


function update() {
  if (P.dead) return;
  if (P.iframes > 0) P.iframes--;
  let spd = P.locked ? 0 : P.spd;
  if (keys['w']) P.y -= spd;
  if (keys['s']) P.y += spd;
  if (keys['a']) P.x -= spd;
  if (keys['d']) P.x += spd;
  cam.x = P.x - canvas.width / 2;
  cam.y = P.y - canvas.height / 2;
  P.angle = Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2);
  if (P.ce < P.maxCe) P.ce += 0.15;
  if (screenShake > 0) screenShake *= 0.9;
  if (screenShake < 0.5) screenShake = 0;

  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    if (p.type === 'fireArrow') {
      p.speed += 0.06;
      const ang = Math.atan2(P.y - p.y, P.x - p.x);
      p.vx = Math.cos(ang) * p.speed;
      p.vy = Math.sin(ang) * p.speed;
      p.spin = (p.spin || 0) + 0.15;
      if (Math.random() < 0.5) {
        particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2, life:0.3, col:'#ff6600', r:4, decay:0.9 });
      }
    }
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.type === 'meteor') {
      p.vy += 0.15;
      p.r *= 1.01;
      if (Math.random() < 0.5) {
        particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*3, vy:-2, life:0.4, col:'#ff4400', r:5, decay:0.9 });
      }
      if (p.vy >= 0 && p.y > 500) {
        P.hp -= p.dmg;
        P.iframes = 20;
        spawnParticles(p.x, p.y, '#ff6600', 10, 4, 5);
        spawnDamage(p.x, p.y, p.dmg, '#ff4404');
        projectiles.splice(i, 1);
        continue;
      }
    }
    const pdx = P.x - p.x;
    const pdy = P.y - p.y;
    if (Math.hypot(pdx, pdy) < p.r + 15 && p.r > 0) {
      P.hp -= p.dmg;
      P.iframes = 20;
      spawnDamage(p.x, p.y, p.dmg, '#ff4444');
      spawnParticles(p.x, p.y, p.col, 5, 3, 3);
      projectiles.splice(i, 1);
      continue;
    }
    if (p.life <= 0 || Math.abs(p.x) > 3000 || Math.abs(p.y) > 3000) {
      projectiles.splice(i, 1);
    }
  }

  for (let i = orbs.length - 1; i >= 0; i--) {
    const o = orbs[i];
    if (o.type === 'maxblue') {
      o.orbit += o.speed;
      o.pulse += 0.08;
      o.corePulse += 0.12;
      o.shockwave += 0.04;
      o.sparkleTimer = (o.sparkleTimer || 0) + 1;
      o.x = P.x + Math.cos(o.orbit) * 75;
      o.y = P.y + Math.sin(o.orbit) * 75;
      for (const e of enemies) {
        const dx = o.x - e.x;
        const dy = o.y - e.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 220) {
          const pull = dist < 80 ? 6 : 3;
          e.x += dx / dist * pull;
          e.y += dy / dist * pull;
          e.hp -= o.dmg * 0.08;
          spawnDamage(e.x, e.y - 20, Math.floor(o.dmg * 0.08), '#00b4ff');
          if (Math.random() < 0.5) {
            particles.push({ x:e.x, y:e.y, vx:(o.x - e.x) * 0.2, vy:(o.y - e.y) * 0.2, life:0.5, col:'#00ffff', r:4, decay:0.9 });
          }
        }
      }
      if (boss && bossActive) {
        const dx = o.x - boss.x;
        const dy = o.y - boss.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 250) {
          boss.x += dx / dist * 5;
          boss.y += dy / dist * 5;
          boss.hp -= o.dmg * 0.12;
          spawnDamage(boss.x, boss.y - 30, Math.floor(o.dmg * 0.12), '#00b4ff');
        }
      }
      for (let j = 0; j < 6; j++) {
        const trailAng = o.orbit - j * 0.3;
        const trailDist = 75 - j * 8;
        particles.push({
          x: P.x + Math.cos(trailAng) * trailDist,
          y: P.y + Math.sin(trailAng) * trailDist,
          vx:(Math.random()-0.5)*0.8,
          vy:(Math.random()-0.5)*0.8,
          life: 0.5,
          col: 'rgba(0,' + (140 + j * 20) + ',255,' + (0.6 - j * 0.08) + ')',
          r: 7 - j * 0.8,
          decay: 0.88
        });
      }
      if (o.sparkleTimer % 8 === 0) {
        const spAng = Math.random() * Math.PI * 2;
        particles.push({ x:o.x + Math.cos(spAng) * 80, y:o.y + Math.sin(spAng) * 80, vx:(Math.random()-0.5), vy:(Math.random()-0.5), life:0.6, col:'#aaddff', r:3, decay:0.9 });
      }
    } else if (o.orbit !== undefined) {
      o.orbit += o.speed;
      o.x = P.x + Math.cos(o.orbit) * 60;
      o.y = P.y + Math.sin(o.orbit) * 60;
    } else {
      o.x += o.vx;
      o.y += o.vy;
      if (o.type === 'purple' && Math.random() < 0.4) {
        particles.push({ x:o.x, y:o.y, vx:(Math.random()-0.5), vy:(Math.random()-0.5), life:0.3, col:'#800080', r:3, decay:0.9 });
      }
    }
    o.life--;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = e.x - o.x;
      const dy = e.y - o.y;
      const dist = Math.hypot(dx, dy);
      if (dist < o.r + e.r && o.type !== 'maxblue') {
        e.hp -= o.dmg;
        spawnDamage(e.x, e.y - 20, o.dmg, '#fff');
        if (o.type === 'red') {
          e.vx = Math.cos(P.angle) * 8;
          e.vy = Math.sin(P.angle) * 8;
        }
        if (!o.pierce && !o.orbit && o.type !== 'maxblue') {
          orbs.splice(i, 1);
          break;
        }
      }
    }
    if (o.life <= 0) orbs.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    if (p.decay) { p.vx *= p.decay; p.vy *= p.decay; }
    p.life -= 0.016;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (let i = damages.length - 1; i >= 0; i--) {
    const d = damages[i];
    d.y += d.vy;
    d.life -= 0.02;
    if (d.life <= 0) damages.splice(i, 1);
  }

  bossUpdate();

  if (boss && bossActive) {
    const bdx = boss.x - P.x;
    const bdy = boss.y - P.y;
    const bdist = Math.hypot(bdx, bdy);
    if (bdist < boss.r + 20 && P.iframes <= 0) {
      P.hp -= 1;
      P.iframes = 20;
    }
  } else if (Math.random() < 0.025 && enemies.length < 12 + wave * 2) {
    spawnEnemy();
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.stun > 0) { e.stun--; continue; }
    const dx = P.x - e.x;
    const dy = P.y - e.y;
    const dist = Math.hypot(dx, dy);
    if (dist < e.aggro && dist > 10) {
      e.x += dx / dist * e.spd;
      e.y += dy / dist * e.spd;
      e.state = 'chasing';
    } else {
      e.state = 'idle';
    }
    if (dist < 30 && P.iframes <= 0) {
      P.hp -= 0.5;
      P.iframes = 20;
    }
    if (e.hp <= 0) {
      score += e.score;
      waveKills++;
      spawnParticles(e.x, e.y, e.col, 10, 3);
      enemies.splice(i, 1);
      if (!bossActive && waveKills >= killsPerWave) {
        spawnBoss();
      }
    }
  }

  if (boss && bossActive && boss.hp <= 0) bossDie();
  if (P.hp <= 0 && !P.dead) {
    P.dead = true;
    document.getElementById('game-over').classList.add('show');
    document.getElementById('final-score').textContent = 'Score: ' + score + ' | Wave: ' + wave;
  }
  updateUI();
}

function drawMaxBlue(sx, sy, o) {
  const pulse = 1 + Math.sin(o.pulse) * 0.25;
  const corePulse = 1 + Math.sin(o.corePulse) * 0.15;
  for (let ring = 5; ring >= 1; ring--) {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, o.r * ring * 2.2 * pulse);
    grad.addColorStop(0, 'rgba(0,' + (120 + ring * 30) + ',255,' + (0.35 / ring) + ')');
    grad.addColorStop(0.5, 'rgba(0,' + (80 + ring * 20) + ',200,' + (0.2 / ring) + ')');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, o.r * ring * 2.2 * pulse, 0, Math.PI * 2);
    ctx.fill();
  }
  const coreGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, o.r * corePulse * 1.3);
  coreGrad.addColorStop(0, '#ffffff');
  coreGrad.addColorStop(0.15, '#aaddff');
  coreGrad.addColorStop(0.4, '#44aaff');
  coreGrad.addColorStop(0.7, '#0066cc');
  coreGrad.addColorStop(1, 'rgba(0,40,150,0.3)');
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(sx, sy, o.r * corePulse * 1.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(150,200,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, sy, o.r * 1.8 * pulse, 0, Math.PI * 2);
  ctx.stroke();
  for (let i = 0; i < 12; i++) {
    const ang = o.pulse * 0.6 + i * (Math.PI / 6);
    const len = 90 + Math.sin(o.pulse + i) * 25 + 5;
    ctx.strokeStyle = 'rgba(100,180,255,' + (0.2 + Math.sin(o.pulse + i) * 0.1) + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(sx + Math.cos(ang) * o.r * 1.2 * pulse, sy + Math.sin(ang) * o.r * 1.2 * pulse);
    ctx.lineTo(sx + Math.cos(ang) * len, sy + Math.sin(ang) * len);
    ctx.stroke();
  }
  if (o.shockwave < Math.PI * 4) {
    ctx.strokeStyle = 'rgba(0,130,255,' + (0.25 - o.shockwave / (Math.PI * 10)) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx, sy, o.shockwave * 45, 0, Math.PI * 2);
    ctx.stroke();
  }
  const auraGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 230);
  auraGrad.addColorStop(0, 'rgba(0,100,255,0.08)');
  auraGrad.addColorStop(0.5, 'rgba(0,60,180,0.04)');
  auraGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = auraGrad;
  ctx.beginPath();
  ctx.arc(sx, sy, 230, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e) {
  const sx = e.x - cam.x;
  const sy = e.y - cam.y;
  if (e.state === 'idle') {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.beginPath();
    ctx.arc(sx, sy, e.aggro, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (e.shape === 'blob') {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, e.r * 2);
    grad.addColorStop(0, e.col);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, e.r * 1.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.col;
    const wobble = Math.sin(Date.now() * 0.005) * 3;
    ctx.beginPath();
    ctx.arc(sx, sy, e.r + wobble, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx - 4, sy - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 4, sy - 3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(sx - 4, sy - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 4, sy - 3, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else if (e.shape === 'horned') {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, e.r * 2.2);
    grad.addColorStop(0, e.col);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, e.r * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = e.col;
    ctx.beginPath();
    ctx.moveTo(sx - e.r * 0.5, sy - e.r);
    ctx.lineTo(sx - e.r * 0.8, sy - e.r * 2);
    ctx.lineTo(sx, sy - e.r * 0.8);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + e.r * 0.5, sy - e.r);
    ctx.lineTo(sx + e.r * 0.8, sy - e.r * 2);
    ctx.lineTo(sx, sy - e.r * 0.8);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx, sy, e.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff6666';
    ctx.beginPath();
    ctx.arc(sx - 5, sy - 2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 5, sy - 2, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(sx - 5, sy - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 5, sy - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, e.r * 2.5);
    grad.addColorStop(0, e.col);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, e.r * 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#330033';
    ctx.beginPath();
    ctx.moveTo(sx - e.r * 0.3, sy - e.r);
    ctx.lineTo(sx - e.r * 0.6, sy - e.r * 2.5);
    ctx.lineTo(sx, sy - e.r * 0.5);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(sx + e.r * 0.3, sy - e.r);
    ctx.lineTo(sx + e.r * 0.6, sy - e.r * 2.5);
    ctx.lineTo(sx, sy - e.r * 0.5);
    ctx.fill();
    ctx.fillStyle = e.col;
    ctx.beginPath();
    ctx.ellipse(sx, sy, e.r * 1.2, e.r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(sx - 6, sy - 1, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 6, sy - 1, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(sx - 6, sy - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(sx + 6, sy - 1, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx - 8, sy + 5);
    ctx.lineTo(sx + 8, sy + 5);
    ctx.stroke();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(e.name, sx, sy - e.r - 8);
  ctx.fillStyle = 'rgba(255,0,0,0.6)';
  ctx.fillRect(sx - 18, sy - e.r - 5, 36 * (e.hp / e.maxHp), 4);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx - 18, sy - e.r - 5, 36, 4);
}

function drawBoss() {
  if (!boss || !bossActive) return;
  const sx = boss.x - cam.x;
  const sy = boss.y - cam.y;
  const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, boss.r * 3);
  glow.addColorStop(0, boss.col + '44');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(sx, sy, boss.r * 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = boss.col;
  ctx.shadowBlur = 30;
  ctx.shadowColor = boss.col;
  ctx.beginPath();
  ctx.arc(sx, sy, boss.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.arc(sx - boss.r * 0.3, sy - boss.r * 0.3, boss.r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(boss.name, sx, sy - boss.r - 12);
  ctx.fillStyle = 'rgba(255,0,0,0.7)';
  ctx.fillRect(sx - 30, sy - boss.r - 6, 60 * (boss.hp / boss.maxHp), 5);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx - 30, sy - boss.r - 6, 60, 5);
}

function drawProjectile(p) {
  const sx = p.x - cam.x;
  const sy = p.y - cam.y;
  if (p.type === 'meteor') {
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.r * 2);
    grad.addColorStop(0, '#ff6600');
    grad.addColorStop(0.5, '#ff3300');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(sx, sy, p.r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'fireArrow') {
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(p.spin || 0);
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.2, '#ffaa00');
    grad.addColorStop(0.5, '#ff4400');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.shadowBlur = 15;
    ctx.shadowColor = p.col;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function draw() {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
  }
  ctx.strokeStyle = 'rgba(0,180,255,0.05)';
  for (let x = Math.floor(cam.x / 100) * 100; x < cam.x + canvas.width; x += 100) {
    ctx.beginPath();
    ctx.moveTo(x - cam.x, 0);
    ctx.lineTo(x - cam.x, canvas.height);
    ctx.stroke();
  }
  for (let y = Math.floor(cam.y / 100) * 100; y < cam.y + canvas.height; y += 100) {
    ctx.beginPath();
    ctx.moveTo(0, y - cam.y);
    ctx.lineTo(canvas.width, y - cam.y);
    ctx.stroke();
  }
  for (const p of particles) {
    ctx.globalAlpha = Math.min(p.life, 1);
    const grad = ctx.createRadialGradient(p.x - cam.x, p.y - cam.y, 0, p.x - cam.x, p.y - cam.y, p.r * 2);
    grad.addColorStop(0, p.col);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x - cam.x, p.y - cam.y, p.r * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const o of orbs) {
    const sx = o.x - cam.x;
    const sy = o.y - cam.y;
    if (o.type === 'maxblue') {
      drawMaxBlue(sx, sy, o);
    } else if (o.orbit !== undefined) {
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, o.r * 2);
      grad.addColorStop(0, o.col);
      grad.addColorStop(0.5, o.col + '88');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, o.r * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 25;
      ctx.shadowColor = o.col;
      ctx.fillStyle = o.col;
      ctx.beginPath();
      ctx.arc(sx, sy, o.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, o.r * 2);
      grad.addColorStop(0, o.col);
      grad.addColorStop(0.5, o.col + '88');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sx, sy, o.r * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 20;
      ctx.shadowColor = o.col;
      ctx.fillStyle = o.col;
      ctx.beginPath();
      ctx.arc(sx, sy, o.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
  for (const p of projectiles) {
    drawProjectile(p);
  }
  for (const e of enemies) {
    drawEnemy(e);
  }
  drawBoss();
  for (const d of damages) {
    ctx.globalAlpha = d.life;
    ctx.fillStyle = d.col;
    ctx.font = 'bold ' + d.size + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.val, d.x - cam.x, d.y - cam.y);
  }
  ctx.globalAlpha = 1;
  if (!P.dead) {
    const px = P.x - cam.x;
    const py = P.y - cam.y;
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(P.angle);
    const auraGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 35);
    auraGrad.addColorStop(0, 'rgba(0,180,255,0.4)');
    auraGrad.addColorStop(0.5, 'rgba(0,100,200,0.2)');
    auraGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = auraGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-8, -25);
    ctx.lineTo(-12, -35);
    ctx.lineTo(-4, -30);
    ctx.lineTo(0, -40);
    ctx.lineTo(4, -30);
    ctx.lineTo(12, -35);
    ctx.lineTo(8, -25);
    ctx.quadraticCurveTo(15, -15, 12, -5);
    ctx.lineTo(8, 0);
    ctx.lineTo(-8, 0);
    ctx.lineTo(-12, -5);
    ctx.quadraticCurveTo(-15, -15, -8, -25);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(-14, 15);
    ctx.lineTo(-8, 35);
    ctx.lineTo(0, 40);
    ctx.lineTo(8, 35);
    ctx.lineTo(14, 15);
    ctx.lineTo(10, 0);
    ctx.fill();
    ctx.fillStyle = '#2a2a4e';
    ctx.beginPath();
    ctx.moveTo(-6, 5);
    ctx.lineTo(-9, 18);
    ctx.lineTo(-5, 30);
    ctx.lineTo(0, 32);
    ctx.lineTo(5, 30);
    ctx.lineTo(9, 18);
    ctx.lineTo(6, 5);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, -8, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(-8, -12);
    ctx.lineTo(0, -5);
    ctx.lineTo(8, -12);
    ctx.lineTo(8, -4);
    ctx.lineTo(0, 2);
    ctx.lineTo(-8, -4);
    ctx.fill();
    ctx.fillStyle = '#00b4ff';
    ctx.beginPath();
    ctx.arc(-3, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3, -6, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#00b4ff';
    ctx.beginPath();
    ctx.moveTo(22, 0);
    ctx.lineTo(10, -8);
    ctx.lineTo(10, 8);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

nextWave();
loop();

</script></body></html>
